name: X-API-Spec-ID
in: header
required: false
description: |
  **Response header.** Identifier of the specific API specification in use,
  referencing the branch name or release identifier from the EDI@Energy Git.
  Can be the main branch or a consultation/release branch identifier.
  
  Complements `X-API-Spec-Ref` (full git reference) and `X-API-Spec-Version`
  (semantic version). Provides a short human-readable identifier for the
  active API variant.
  
  **German:** **Response-Header.** Verweis auf die verwendete API aus edi@energy Git.
  Kann z.B. `main` oder den Branch-/Release-Bezeichner enthalten.
  
  **Korrekturen gegenüber Vorlage:** `X-Api-Spec-Id` → **`X-API-Spec-ID`**
  (Akronym API und ID werden großgeschrieben).
schema:
  type: string
  maxLength: 100
  description: |
    Branch name, release tag, or identifier of the active API specification.
  examples:
    ConsultationId:
      summary: "Consultation release identifier"
      value: "2026-02-02-consultation"
    MainBranch:
      summary: "Main branch"
      value: "main"
    ReleaseTag:
      summary: "Production release tag"
      value: "release-2026-q1"
x-header-group: version-control
x-direction: response
x-rfc: "EDI@Energy Konvention"
