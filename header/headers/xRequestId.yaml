name: X-Request-ID
in: header
required: false
description: |
  Unique identifier for a single HTTP request. Can be generated by either the
  client or the server. Lifetime is scoped to this single request only.
  Can be used as an alternative to `Idempotency-Key`.
  
  If the client provides this header, the server SHOULD echo it back in the
  response unchanged to enable end-to-end request correlation in logs and
  distributed tracing.
  
  **German:** Eindeutige Kennung für genau einen HTTP-Request. Kann vom Client
  oder Server erzeugt werden. Lebensdauer beschränkt auf diesen einzelnen Request.
  Kann alternativ zu `Idempotency-Key` verwendet werden.
  
  **Korrekturen gegenüber Vorlage:** `X-Request-Id` → `X-Request-ID`
  (Akronym ID wird großgeschrieben – gängige HTTP-Header-Konvention).
schema:
  type: string
  format: uuid
  pattern: '^[0-9a-fA-F]{8}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{4}-[0-9a-fA-F]{12}$'
  minLength: 36
  maxLength: 36
  description: UUID v4 format.
  examples:
    UUIDv4:
      summary: "Standard UUID v4"
      value: "7c9b3a2e-3c8a-4f0e-9a16-2a4efc0d2b8a"
    AnotherUUID:
      summary: "Another UUID v4 example"
      value: "a1b2c3d4-e5f6-7890-abcd-ef1234567890"
x-header-group: general
x-direction: request-response
x-rfc: "Konvention; vgl. RFC 9110 §10"
