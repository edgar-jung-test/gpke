openapi: 3.0.3
info:
  title: GPKE Supply Start (Lieferbeginn) REST API
  version: 1.0.0
  description: >
    REST API for the GPKE use-case "Lieferbeginn" (supply start), representing
    the business data typically transported via UTILMD.
servers:
  - url: https://api.example.com
paths:
  /supply-starts:
    post:
      summary: Create a supply start request
      description: Submit a new Lieferbeginn (registration) request.
      operationId: createSupplyStart
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplyStartCreateRequest'
      responses:
        '201':
          description: Created
          headers:
            Location:
              description: URL of the created resource
              schema:
                type: string
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyStart'
        '400':
          description: Validation error
        '409':
          description: Conflict (e.g., another registration already in progress)
    get:
      summary: List supply start requests
      operationId: listSupplyStarts
      parameters:
        - in: query
          name: status
          schema:
            $ref: '#/components/schemas/SupplyStartStatus'
          description: Filter by status
          x-de: Status-Filter
        - in: query
          name: maloId
          schema:
            type: string
          description: Filter by MaLo-ID
          x-de: Filter nach MaLo-ID
        - in: query
          name: fromDate
          schema:
            type: string
            format: date
          description: Filter by requested supply start date (from)
          x-de: Filter nach Lieferbeginn-Datum (von)
        - in: query
          name: toDate
          schema:
            type: string
            format: date
          description: Filter by requested supply start date (to)
          x-de: Filter nach Lieferbeginn-Datum (bis)
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: Page size
          x-de: Seitengröße
        - in: query
          name: offset
          schema:
            type: integer
            minimum: 0
            default: 0
          description: Page offset
          x-de: Seitenoffset
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyStartList'
  /malo/{maloId}/supplyStart:
    get:
      summary: Get a supply start request by ID
      operationId: getSupplyStart
      parameters:
        - in: path
          name: supplyStartId
          required: true
          schema:
            type: string
          description: Supply start request ID
          x-de: Lieferbeginn-Anfrage-ID
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyStart'
        '404':
          description: Not found
    patch:
      summary: Update mutable fields of a supply start request
      description: >
        Update fields that are still changeable before submission/processing.
        Typical use: add notes, correct identification details, etc.
      operationId: patchSupplyStart
      parameters:
        - $ref: ../schema/MarketLocationIdentification.yaml
        - $ref: ''
          in: path
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                SupplyStart:
                  $ref: ../schema/SupplyStart.yaml
                MarketLocationIdentification:
                  $ref: ../schema/MarketLocationIndentification.yaml
              required:
                - SupplyStart
                - MarketLocationIdentification
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyStart'
        '400':
          description: Validation error
        '404':
          description: Not found
        '409':
          description: Conflict (e.g., cannot modify in current status)
    parameters:
      - $ref: ../schema/MarketLocationIdentification.yaml
      - $ref: ../schema/malo.yaml
      - $ref: ../schema/maloId.yaml
      - in: path
        name: maloId
        description: ''
        schema:
          type: string
        required: true
      - $ref: ../header/X-Message-Id.yaml
      - in: header
        name: X-Request-Id
        description: Eindeutige Kennung für diesen einzelnen Request für IdemPotenz
        schema:
          type: string
      - $ref: ../header/X-Message-Id.yaml
      - in: header
        name: X-Message-Id
        description: Kennung für die Transaktion Lieferbeginn
        schema:
          type: string
  /supply-starts/{supplyStartId}/submit:
    post:
      summary: Submit the supply start request for processing
      description: Transition from draft to submitted.
      operationId: submitSupplyStart
      parameters:
        - in: path
          name: supplyStartId
          required: true
          schema:
            type: string
          description: Supply start request ID
          x-de: Lieferbeginn-Anfrage-ID
      responses:
        '202':
          description: Accepted for processing
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SupplyStart'
        '404':
          description: Not found
        '409':
          description: Conflict (e.g., already submitted)
components:
  schemas:
    SupplyStartList:
      $ref: ../schema/SupplyStartList.yaml
    SupplyStart:
      $ref: ../schemas/SupplyStart
    SupplyStartCreateRequest:
      $ref: ../schemas/SupplyStartCreateRequest
    SupplyStartPatchRequest:
      $ref: ../schemas/components/schemas/SupplyStartPatchRequest
    SupplyStartStatus:
      $ref: ../schemas/components/schemas/SupplyStartStatus
    MessageHeader:
      $ref: ../schemas/components/schemas/MessageHeader
    TransactionReason:
      $ref: ../schemas/components/schemas/TransactionReason
    MarketLocationIdentification:
      $ref: ../schemas/components/schemas/MarketLocationIdentification
    PostalAddress:
      $ref: ../schemas/components/schemas/PostalAddress
    CustomerReference:
      $ref: ../schemas/components/schemas/CustomerReference
    BalancingData:
      $ref: ../schemas/components/schemas/BalancingData
    MeterReadingCycle:
      $ref: ../schemas/components/schemas/MeterReadingCycle
    RejectionReason:
      $ref: ../schemas/components/schemas/RejectionReason
  parameters:
    maloID:
      $ref: ../schema/maloId.yaml
  headers:
    X-Message-Id:
      required: false
      description: TranskationsID, Lebensdauer über den kompletten Lieferantenwechsel
      schema:
        type: string
    X-Request-Id:
      required: false
      description: Eindeutige Kennung für diesen einzelnen Request
      schema:
        type: string
