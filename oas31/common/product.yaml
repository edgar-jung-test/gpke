type: object
title: Product
description: |
  Configuration product or supply product code as used in UTILMD market communication.
  Represents the product configuration assigned to a market or grid location.
  
  **German:** Konfigurationsprodukt oder Versorgungsprodukt gemäß UTILMD-Marktkommunikation.
  Repräsentiert das Produktkonfigurationscode, der einer Markt- oder Netzlokation zugeordnet ist.
  Entspricht dem PIA-Segment (Additional Product Id) im EDIFACT-Format.
x-i18n:
  de:
    title: Produkt / Konfigurationsprodukt
    description: Konfigurationsprodukt einer Markt- oder Netzlokation. EDIFACT PIA-Segment.
x-edifact-mapping:
  segment: PIA
  notes: "Additional Product Identification in SG8"
required:
  - productCode
properties:
  productCode:
    type: string
    maxLength: 50
    description: |
      Unique product code identifying the supply or configuration product.
      **German:** Eindeutiger Produktcode für das Versorgungs- oder Konfigurationsprodukt.
    x-i18n:
      de:
        description: Eindeutiger Produktcode für das Versorgungs- oder Konfigurationsprodukt.
    examples:
      Marktpraemie:
        summary: "Marktpraemie"
        value: "9991000002420"
      StandardVersorgung:
        summary: "StandardVersorgung"
        value: "9991000001001"
      EEGAnlage:
        summary: "EEGAnlage"
        value: "9991000003001"
    x-examples-i18n:
      de:
        Marktpraemie: "Marktprämie"
        StandardVersorgung: "Standardversorgung"
        EEGAnlage: "EEG-Anlage"
  name:
    type: ["string", "null"]
    maxLength: 200
    description: |
      Human-readable product name.
      **German:** Lesbare Produktbezeichnung.
    x-i18n:
      de:
        description: Lesbare Produktbezeichnung.
    examples:
      Marktpraemie:
        summary: "Marktpraemie"
        value: "Marktprämie"
      Direktvermarktung:
        summary: "Direktvermarktung"
        value: "Direktvermarktung"
      Grundversorgung:
        summary: "Grundversorgung"
        value: "Grundversorgung"
    x-examples-i18n:
      de:
        Marktpraemie: "Marktprämie"
        Direktvermarktung: "Direktvermarktung"
        Grundversorgung: "Grundversorgung"
  description:
    type: ["string", "null"]
    maxLength: 1000
    description: |
      Detailed product description.
      **German:** Ausführliche Produktbeschreibung.
    x-i18n:
      de:
        description: Ausführliche Produktbeschreibung.
  label:
    $ref: "../common/multilingualLabel.yaml"
