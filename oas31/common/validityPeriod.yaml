type: object
title: ValidityPeriod
description: |
  Defines the temporal validity of a data record with start and optional end date.
  Used throughout UTILMD to qualify time-variant master data.
  
  **German:** Definiert den zeitlichen Gültigkeitsbereich eines Datensatzes mit
  Start- und optionalem Enddatum. Wird in der UTILMD zur Qualifizierung zeitvarianter
  Stammdaten verwendet (z.B. DTM Segmente in EDIFACT).
x-i18n:
  de:
    title: Gültigkeitszeitraum
    description: Definiert den zeitlichen Gültigkeitsbereich eines Datensatzes mit Start- und optionalem Enddatum.
x-edifact-mapping:
  segment: DTM
  qualifier: "163 (valid from) / 164 (valid to)"
properties:
  validFrom:
    type: string
    format: date-time
    description: |
      Start of validity period (inclusive). Format: ISO 8601 date-time.
      **German:** Beginn des Gültigkeitszeitraums (einschließlich). Format: ISO 8601 Datum-Zeit.
    x-i18n:
      de:
        description: Beginn des Gültigkeitszeitraums (einschließlich). Format ISO 8601.
    examples:
      StartOfYear2024:
        summary: "StartOfYear2024"
        value: "2024-01-01T00:00:00Z"
      StartOfOctober:
        summary: "StartOfOctober"
        value: "2024-10-01T00:00:00Z"
      MidYear:
        summary: "MidYear"
        value: "2024-07-01T00:00:00Z"
      FutureDate:
        summary: "FutureDate"
        value: "2025-04-01T00:00:00Z"
    x-examples-i18n:
      de:
        StartOfYear2024: "Jahresbeginn 2024"
        StartOfOctober: "Beginn Oktober 2024"
        MidYear: "Jahresmitte 2024"
        FutureDate: "Zukünftiges Datum"
  validTo:
    type: ["string", "null"]
    format: date-time
    description: |
      End of validity period (exclusive). Null means open-ended / indefinite.
      **German:** Ende des Gültigkeitszeitraums (ausschließlich). Null bedeutet unbegrenzt gültig.
    x-i18n:
      de:
        description: Ende des Gültigkeitszeitraums (ausschließlich). Null bedeutet unbegrenzt.
    examples:
      EndOfYear2024:
        summary: "EndOfYear2024"
        value: "2024-12-31T23:59:59Z"
      EndOfQuarter:
        summary: "EndOfQuarter"
        value: "2024-09-30T23:59:59Z"
      OpenEnded:
        summary: "OpenEnded"
        value: null
    x-examples-i18n:
      de:
        EndOfYear2024: "Jahresende 2024"
        EndOfQuarter: "Quartalsende"
        OpenEnded: "Unbegrenzt gültig"
