type: object
title: Address
description: |
  Postal address of a market participant, location or metering point.
  Mapped to EDIFACT NAD segment data elements.
  
  **German:** Postanschrift eines Marktakteurs, einer Lokation oder Messstelle.
  Entspricht den NAD-Segment-Datenelementen im EDIFACT-Format der UTILMD.
x-i18n:
  de:
    title: Anschrift
    description: Postanschrift eines Marktakteurs, einer Lokation oder Messstelle.
x-edifact-mapping:
  segment: NAD
  notes: "NAD 3042 Street+Number, NAD 3164 City, NAD 3251 PostalCode, NAD 3207 CountryCode, NAD 3124 AdditionalInfo"
properties:
  additionalInfo:
    type: ["string", "null"]
    maxLength: 200
    description: |
      Additional address information such as building name, floor, care-of.
      Corresponds to EDIFACT NAD DE3124.
      **German:** Adresszusatz wie Gebäudename, Etage, c/o. Entspricht EDIFACT NAD DE3124.
    x-i18n:
      de:
        description: Adresszusatz wie Gebäudename, Etage oder c/o-Angabe. EDIFACT NAD DE3124.
    examples:
      BuildingWing:
        summary: "BuildingWing"
        value: "Gebäude B, 3. OG"
      CareOf:
        summary: "CareOf"
        value: "c/o Mustermann GmbH"
      Apartment:
        summary: "Apartment"
        value: "Wohnung 12a"
    x-examples-i18n:
      de:
        BuildingWing: "Gebäudeflügel / Stockwerk"
        CareOf: "c/o Angabe"
        Apartment: "Wohnungsnummer"
  street:
    type: ["string", "null"]
    maxLength: 200
    description: |
      Street name including house number.
      Corresponds to EDIFACT NAD DE3042 (street and house number combined).
      **German:** Straßenname einschließlich Hausnummer. Entspricht EDIFACT NAD DE3042.
    x-i18n:
      de:
        description: Straßenname einschließlich Hausnummer. EDIFACT NAD DE3042.
    examples:
      UrbanStreet:
        summary: "UrbanStreet"
        value: "Reinhardtstraße 32"
      IndustrialPark:
        summary: "IndustrialPark"
        value: "Industriestraße 14b"
      ResidentialArea:
        summary: "ResidentialArea"
        value: "Am Stadtpark 5"
      RuralAddress:
        summary: "RuralAddress"
        value: "Dorfstraße 1"
    x-examples-i18n:
      de:
        UrbanStreet: "Stadtstraße"
        IndustrialPark: "Gewerbegebiet"
        ResidentialArea: "Wohngebiet"
        RuralAddress: "Ländliche Adresse"
  postOfficeBox:
    type: ["string", "null"]
    maxLength: 50
    description: |
      Post office box number, used as an alternative to street address.
      **German:** Postfachnummer, alternativ zur Straßenanschrift.
    x-i18n:
      de:
        description: Postfachnummer, alternativ zur Straßenanschrift.
    examples:
      Standard:
        summary: "Standard"
        value: "Postfach 12 34 56"
      Short:
        summary: "Short"
        value: "Postfach 1000"
    x-examples-i18n:
      de:
        Standard: "Standard"
        Short: "Kurzform"
  city:
    type: ["string", "null"]
    maxLength: 100
    description: |
      City or municipality name.
      Corresponds to EDIFACT NAD DE3164.
      **German:** Ortsname / Stadtname. Entspricht EDIFACT NAD DE3164.
    x-i18n:
      de:
        description: Ortsname oder Stadtname. EDIFACT NAD DE3164.
    examples:
      Berlin:
        summary: "Berlin"
        value: "Berlin"
      Hamburg:
        summary: "Hamburg"
        value: "Hamburg"
      Munich:
        summary: "Munich"
        value: "München"
      Frankfurt:
        summary: "Frankfurt"
        value: "Frankfurt am Main"
      Stuttgart:
        summary: "Stuttgart"
        value: "Stuttgart"
      Cologne:
        summary: "Cologne"
        value: "Köln"
    x-examples-i18n:
      de:
        Berlin: "Berlin"
        Hamburg: "Hamburg"
        Munich: "München"
        Frankfurt: "Frankfurt am Main"
        Stuttgart: "Stuttgart"
        Cologne: "Köln"
  postalCode:
    type: ["string", "null"]
    maxLength: 20
    description: |
      Postal code (ZIP code). For Germany typically 5 digits.
      Corresponds to EDIFACT NAD DE3251.
      **German:** Postleitzahl. Für Deutschland in der Regel 5-stellig. EDIFACT NAD DE3251.
    x-i18n:
      de:
        description: Postleitzahl. In Deutschland 5-stellig. EDIFACT NAD DE3251.
    examples:
      BerlinMitte:
        summary: "BerlinMitte"
        value: "10117"
      Hamburg:
        summary: "Hamburg"
        value: "20095"
      Munich:
        summary: "Munich"
        value: "80331"
      Frankfurt:
        summary: "Frankfurt"
        value: "60311"
      Stuttgart:
        summary: "Stuttgart"
        value: "70173"
      Cologne:
        summary: "Cologne"
        value: "50667"
    x-examples-i18n:
      de:
        BerlinMitte: "Berlin Mitte"
        Hamburg: "Hamburg"
        Munich: "München"
        Frankfurt: "Frankfurt am Main"
        Stuttgart: "Stuttgart"
        Cologne: "Köln"
  countryCode:
    type: ["string", "null"]
    maxLength: 2
    description: |
      ISO 3166-1 alpha-2 country code.
      Corresponds to EDIFACT NAD DE3207.
      **German:** ISO 3166-1 alpha-2 Ländercode. EDIFACT NAD DE3207. Beispiel: DE für Deutschland.
    x-i18n:
      de:
        description: ISO 3166-1 alpha-2 Ländercode. EDIFACT NAD DE3207.
    examples:
      Germany:
        summary: "Germany"
        value: "DE"
      Austria:
        summary: "Austria"
        value: "AT"
      Switzerland:
        summary: "Switzerland"
        value: "CH"
      Luxembourg:
        summary: "Luxembourg"
        value: "LU"
    x-examples-i18n:
      de:
        Germany: "Deutschland"
        Austria: "Österreich"
        Switzerland: "Schweiz"
        Luxembourg: "Luxemburg"
