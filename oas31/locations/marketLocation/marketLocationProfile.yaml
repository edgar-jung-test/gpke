type: object
title: MarketLocationProfile
description: |
  Load profile assignment for a market location, defining the measurement method
  and profile type used for billing and settlement.
  
  **German:** Lastprofil-Zuordnung für eine Marktlokation, die die Messmethode und
  den Profiltyp für Abrechnung und Bilanzierung definiert.
  Entspricht der Profil-/SLP-Zuordnung in UTILMD Stammdaten.
x-i18n:
  de:
    title: Lastprofil-Zuordnung der Marktlokation
    description: Lastprofil-Zuordnung (SLP/RLM) für eine Marktlokation inkl. Gültigkeitszeitraum.
required:
  - profileCode
  - profileType
properties:
  profileCode:
    type: string
    maxLength: 50
    description: |
      Specific profile code assigned to this market location (e.g. H0, G0, L0).
      **German:** Spezifischer Profilcode der Marktlokation (z.B. H0, G0, L0).
    x-i18n:
      de:
        description: Spezifischer Profilcode der Marktlokation, z.B. H0 (Haushalt), G0 (Gewerbe).
    examples:
      Household:
        summary: "Household"
        value: "H0"
      Commerce:
        summary: "Commerce"
        value: "G0"
      Agriculture:
        summary: "Agriculture"
        value: "L0"
      NightStorage:
        summary: "NightStorage"
        value: "N0"
      HeatPump:
        summary: "HeatPump"
        value: "WP"
      PV:
        summary: "PV"
        value: "PV1"
    x-examples-i18n:
      de:
        Household: "Haushalt (H0)"
        Commerce: "Gewerbe (G0)"
        Agriculture: "Landwirtschaft (L0)"
        NightStorage: "Nachtspeicher (N0)"
        HeatPump: "Wärmepumpe (WP)"
        PV: "Photovoltaik (PV1)"
  profileType:
    $ref: "../../enumerations/profileType.yaml"
  validity:
    $ref: "../../common/validityPeriod.yaml"
  label:
    $ref: "../../common/multilingualLabel.yaml"
