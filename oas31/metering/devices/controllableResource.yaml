type: object
title: ControllableResource
description: |
  Controllable resource (Steuerbare Ressource / SR) – a technical resource that can be
  remotely controlled (switched on/off or throttled) by the grid operator or feed-in
  manager. Each controllable resource is derived from a technical resource and must have
  either a control device (Steuereinrichtung) or a control box (Steuerbox).
  Corresponds to EDIFACT SG5 LOC+Z19 (SR).
  
  **German:** Steuerbare Ressource (SR) – eine technische Ressource, die durch den
  Netzbetreiber oder Einspeiseverantwortlichen ferngesteuert werden kann (ein-/ausschalten
  oder drosseln). Jede steuerbare Ressource leitet sich aus einer technischen Ressource
  ab und muss entweder eine Steuereinrichtung oder eine Steuerbox besitzen.
  Entspricht EDIFACT SG5 LOC+Z19 (SR).
x-i18n:
  de:
    title: Steuerbare Ressource (SR)
    description: |
      Fernsteuerbare technische Ressource (ein-/ausschalten, drosseln).
      Benötigt Steuereinrichtung oder Steuerbox. EDIFACT SG5 LOC+Z19.
