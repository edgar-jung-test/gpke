title: MeteringPointOperatorAssignment
description: |
  Assignment of a metering point operator (MSB) to a location.
  The MSB type (Z39/Z40/Z41) determines which additional fields are required.

  **UTILMD AHB Rule (SG10 CAV DE7111=Z91, DE7110):**
  - `Z39` – Basic MSB (gMSB): no further qualification required
  - `Z40` – Competitive MSB (wMSB): requires `operatingBasis`
    (Z19 = contractual with connection user, Z20 = delegated by gMSB)
  - `Z41` – Default MSB (Auffang-MSB): no further qualification required

  **German:** Messstellenbetreiber-Zuordnung (MSB). Der MSB-Typ (Z39/Z40/Z41)
  bestimmt, ob eine Ausübungsgrundlage erforderlich ist.
  Regel: EDIFACT SG10 CAV DE7111=Z91, DE7110.

x-i18n:
  de:
    title: Messstellenbetreiber-Zuordnung (bedingt)
    description: |
      Bedingtes Schema: Z40 (wMSB) erfordert Ausübungsgrundlage (Z19 oder Z20).
      Z39 (gMSB) und Z41 (Auffang) benötigen keine weitere Qualifikation.

x-edifact-mapping:
  segment: CAV (SG10)
  de7111: "Z91 (Messstellenbetreiber)"
  de7110: "Z39 | Z40 | Z41 (MSB-Typ) – dann Z19 | Z20 (Ausübungsgrundlage)"

type: object
required:
  - actorId
  - msbType

properties:
  actorId:
    type: object
    description: |
      Market participant ID (MP-ID) of the metering point operator.
      **German:** Marktpartner-ID (MP-ID) des Messstellenbetreibers.
    x-i18n:
      de:
        description: MP-ID des Messstellenbetreibers.
    required: [id, codingScheme]
    properties:
      id:
        type: string
        description: MP-ID of the MSB. **German:** MP-ID des MSB.
        x-i18n:
          de:
            description: Marktpartner-ID des MSB.
        examples:
          BasicMSB:
            summary: "BasicMSB"
            value: "9901234567890"
          CompetitiveMSB:
            summary: "CompetitiveMSB"
            value: "9909876543210"
          DefaultMSB:
            summary: "DefaultMSB"
            value: "9905555555550"
        x-examples-i18n:
          de:
            BasicMSB: "Grundzuständiger MSB"
            CompetitiveMSB: "Wettbewerblicher MSB"
            DefaultMSB: "Auffangmessstellenbetreiber"
      codingScheme:
        type: string
        enum: ["9", "293", "260"]

  msbType:
    type: string
    enum: [Z39, Z40, Z41]
    description: |
      MSB type code.
      - Z39: Basic metering point operator (grundzuständiger MSB / gMSB)
      - Z40: Competitive metering point operator (wettbewerblicher MSB / wMSB)
      - Z41: Default / fallback metering point operator (Auffangmessstellenbetreiber)
      **German:** MSB-Typ. Z39=gMSB, Z40=wMSB, Z41=Auffang-MSB.
    x-i18n:
      de:
        description: MSB-Typ. Z39=grundzuständig (gMSB), Z40=wettbewerblich (wMSB), Z41=Auffang.
    examples:
      BasicMSB:
        summary: "BasicMSB"
        value: "Z39"
      CompetitiveMSB:
        summary: "CompetitiveMSB"
        value: "Z40"
      DefaultMSB:
        summary: "DefaultMSB"
        value: "Z41"
    x-examples-i18n:
      de:
        BasicMSB: "Grundzuständiger MSB (gMSB)"
        CompetitiveMSB: "Wettbewerblicher MSB (wMSB)"
        DefaultMSB: "Auffangmessstellenbetreiber"

  operatingBasis:
    type: string
    enum: [Z19, Z20]
    description: |
      Operating basis for the competitive MSB (Z40 only).
      - Z19: Acting on contractual basis towards connection user/owner
      - Z20: Acting in delegated responsibility from the basic MSB (gMSB)
      **German:** Ausübungsgrundlage für wMSB (nur Z40).
      Z19 = auf vertraglicher Grundlage, Z20 = Weiterverpflichtung durch gMSB.
    x-i18n:
      de:
        description: |
          Ausübungsgrundlage des wMSB (nur bei Z40).
          Z19 = vertraglich ggü. Anschlussnutzer, Z20 = Weiterverpflichtung durch gMSB.
    examples:
      Contractual:
        summary: "Contractual"
        value: "Z19"
      DelegatedByGMSB:
        summary: "DelegatedByGMSB"
        value: "Z20"
    x-examples-i18n:
      de:
        Contractual: "Auf vertraglicher Grundlage (Z19)"
        DelegatedByGMSB: "Weiterverpflichtung durch gMSB (Z20)"

# ── Conditional: Z40 requires operatingBasis ───────────────────────────────

if:
  properties:
    msbType:
      const: Z40
  required: [msbType]

then:
  description: |
    **Z40 (Wettbewerblicher MSB):**
    `operatingBasis` is required — must be Z19 or Z20.
    **German:** Bei Z40 (wMSB) ist die Ausübungsgrundlage (Z19 oder Z20) Pflicht.
  required:
    - operatingBasis

else:
  description: |
    **Z39 / Z41:**
    `operatingBasis` must not be present — only applicable for Z40 (wMSB).
    **German:** Bei Z39 (gMSB) und Z41 (Auffang) ist keine Ausübungsgrundlage erlaubt.
  properties:
    operatingBasis:
      not: {}
      description: |
        Not applicable for Z39 (gMSB) or Z41 (Auffang-MSB).
        **German:** Nicht anwendbar bei Z39 (gMSB) oder Z41 (Auffang-MSB).
      x-i18n:
        de:
          description: Nicht anwendbar bei gMSB oder Auffang-MSB.
