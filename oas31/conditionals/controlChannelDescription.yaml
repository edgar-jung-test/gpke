title: ControlChannelDescription
description: |
  Grid location control channel (Steuerkanal) with conditional validation.

  **UTILMD AHB Rule (SG10 CCI+Z49 / CAV ZF2):**
  When `hasControlChannel` is true, the `controlChannelType` (An/Aus or Gestuft)
  must be specified. When false, no control channel properties may be present.

  **German:** Steuerkanal einer Netzlokation mit bedingter Validierung.
  EDIFACT SG10 CCI+Z49 (Leistungsbeschreibung Steuerkanal) / CAV ZF2.
  Wenn Steuerkanal vorhanden, ist Leistungsbeschreibung (Z14=An/Aus, Z15=Gestuft) Pflicht.

x-i18n:
  de:
    title: Netzlokation Steuerkanal (bedingt)
    description: |
      Bedingtes Schema: Wenn Steuerkanal vorhanden, ist Leistungsbeschreibung Pflicht.
      EDIFACT SG10 CCI+Z49 / CAV ZF2. Z14=An/Aus, Z15=Gestuft.

x-edifact-mapping:
  segment: "CCI+Z49 / CAV (SG10)"
  de7111: "ZF2 (Leistungsbeschreibung des Steuerkanals)"
  de7110: "Z14 (An/Aus) | Z15 (Gestuft)"

type: object
required:
  - neLoId
  - hasControlChannel

properties:
  neLoId:
    type: string
    description: |
      Grid location ID. **German:** Netzlokations-ID (NeLo-ID).
    x-i18n:
      de:
        description: Netzlokations-ID (NeLo-ID).
    examples:
      LV:
        summary: "LV"
        value: "DE0001234567890001NE000001S0A001"
      MV:
        summary: "MV"
        value: "DE0009876543210001NE000042S0B002"
    x-examples-i18n:
      de:
        LV: "Niederspannungsanschluss"
        MV: "Mittelspannungsanschluss"

  hasControlChannel:
    type: boolean
    description: |
      Whether a control channel is present at this grid location.
      **German:** Gibt an, ob an dieser Netzlokation ein Steuerkanal vorhanden ist.
    x-i18n:
      de:
        description: Gibt an, ob ein Steuerkanal vorhanden ist (z.B. RSE, SMGW).
    examples:
      WithChannel:
        summary: "WithChannel"
        value: true
      WithoutChannel:
        summary: "WithoutChannel"
        value: false
    x-examples-i18n:
      de:
        WithChannel: "Mit Steuerkanal"
        WithoutChannel: "Ohne Steuerkanal"

  controlChannelType:
    type: string
    enum: [Z14, Z15]
    description: |
      Control channel performance type.
      - Z14: On/Off switching (An/Aus)
      - Z15: Stepped control (Gestuft)
      Required when hasControlChannel is true.
      **German:** Leistungsbeschreibung des Steuerkanals. Z14=An/Aus, Z15=Gestuft.
      Pflicht wenn Steuerkanal vorhanden.
    x-i18n:
      de:
        description: Leistungsbeschreibung des Steuerkanals. Z14=An/Aus, Z15=Gestuft. Pflicht bei Steuerkanal.
    examples:
      OnOff:
        summary: "OnOff"
        value: "Z14"
      Stepped:
        summary: "Stepped"
        value: "Z15"
    x-examples-i18n:
      de:
        OnOff: "An/Aus-Steuerung"
        Stepped: "Gestufte Steuerung"

if:
  properties:
    hasControlChannel:
      const: true
  required: [hasControlChannel]

then:
  description: |
    **Steuerkanal vorhanden:**
    controlChannelType (Z14 oder Z15) is required.
    **German:** Wenn Steuerkanal vorhanden: Leistungsbeschreibung (Z14/Z15) Pflicht.
  required:
    - controlChannelType

else:
  description: |
    **Kein Steuerkanal:**
    controlChannelType must not be present.
    **German:** Wenn kein Steuerkanal: Leistungsbeschreibung nicht erlaubt.
  properties:
    controlChannelType:
      not: {}
