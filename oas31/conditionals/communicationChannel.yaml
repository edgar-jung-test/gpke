title: CommunicationChannel
description: |
  Communication channel of a market participant with format validation
  dependent on the channel type.

  **UTILMD AHB Rule (SG3 COM DE3155 / DE3148):**
  - `EM` (email): value must contain `@` and `.`
  - `TE` / `FX` / `AJ` / `AL` (telephone/fax/mobile): value must start with `+`
    followed by digits only
  - Only one piece of information per COM segment (hint [514])

  **German:** Kommunikationskanal mit typabhängiger Formatvalidierung.
  EDIFACT SG3 COM DE3155 (Kanaltyp) und DE3148 (Wert).
  Bedingung [321]/[322]/[939]/[940]: Format abhängig vom Kanalcode.

x-i18n:
  de:
    title: Kommunikationskanal (bedingt)
    description: |
      Bedingtes Schema: E-Mail-Format bei EM, Telefon-Format (+Ziffern) bei TE/FX/AJ/AL.
      EDIFACT SG3 COM DE3155/DE3148. Hinweis [514]: nur eine Info pro COM.

x-edifact-mapping:
  segment: COM (SG3)
  de3155: "EM | TE | FX | AJ | AL"
  de3148: "Wert (E-Mail oder Telefonnummer)"
  conditions:
    "[321]": "Wenn DE3155=EM: Format muss @ und . enthalten"
    "[322]": "Wenn DE3155=TE/FX/AJ/AL: Format muss mit + beginnen, danach nur Ziffern"
    "[514]": "Es darf nur eine Information je COM übermittelt werden"

type: object
required:
  - channelType
  - value

properties:
  channelType:
    type: string
    enum: [EM, TE, FX, AJ, AL]
    description: |
      Communication channel type code (EDIFACT COM DE3155).
      - EM: Electronic mail (Elektronische Post)
      - TE: Telephone (Telefon)
      - FX: Fax (Telefax)
      - AJ: Additional phone (weiteres Telefon)
      - AL: Mobile phone (Handy)
      **German:** Kommunikationskanaltyp (EDIFACT COM DE3155).
    x-i18n:
      de:
        description: |
          Kommunikationskanaltyp. EM=E-Mail, TE=Telefon, FX=Fax, AJ=weiteres Telefon, AL=Handy.
    examples:
      Email:
        summary: "Email"
        value: "EM"
      Phone:
        summary: "Phone"
        value: "TE"
      Fax:
        summary: "Fax"
        value: "FX"
      AdditionalPhone:
        summary: "AdditionalPhone"
        value: "AJ"
      Mobile:
        summary: "Mobile"
        value: "AL"
    x-examples-i18n:
      de:
        Email: "Elektronische Post (E-Mail)"
        Phone: "Telefon"
        Fax: "Telefax"
        AdditionalPhone: "Weiteres Telefon"
        Mobile: "Handy / Mobiltelefon"

  value:
    type: string
    maxLength: 512
    description: |
      Communication address or number. Format depends on channelType.
      **German:** Kommunikationsadresse oder -nummer. Format abhängig vom Kanaltyp.
    x-i18n:
      de:
        description: Kommunikationsadresse/-nummer. Format hängt vom Kanaltyp ab.
    examples:
      EmailExample:
        summary: "EmailExample"
        value: "marktkommunikation@netzbetreiber.de"
      PhoneExample:
        summary: "PhoneExample"
        value: "+4930123456789"
      FaxExample:
        summary: "FaxExample"
        value: "+4930123456780"
      MobileExample:
        summary: "MobileExample"
        value: "+491701234567"
    x-examples-i18n:
      de:
        EmailExample: "E-Mail-Adresse Beispiel"
        PhoneExample: "Telefonnummer Beispiel"
        FaxExample: "Faxnummer Beispiel"
        MobileExample: "Mobilnummer Beispiel"

# ── Conditional format validation based on channelType ─────────────────────

if:
  properties:
    channelType:
      const: EM
  required: [channelType]

then:
  # AHB condition [321] / [939]: email must contain @ and .
  description: |
    **EM (Elektronische Post):**
    Value must be a valid email address containing `@` and `.`.
    AHB condition [939]: Die Zeichenkette muss die Zeichen @ und . enthalten.
    **German:** AHB [939]: E-Mail-Adresse muss @ und . enthalten.
  properties:
    value:
      type: string
      format: email
      pattern: '^[^@]+@[^@]+\.[^@]+$'
      description: |
        Email address. Must contain `@` and `.` (AHB condition [939]).
        **German:** E-Mail-Adresse. Muss @ und . enthalten (AHB Bedingung [939]).
      x-i18n:
        de:
          description: E-Mail-Adresse. Pflicht: @ und . enthalten (AHB [939]).
      examples:
        Corporate:
          summary: "Corporate"
          value: "marktkommunikation@netzbetreiber.de"
        Personal:
          summary: "Personal"
          value: "max.mustermann@stadtwerke.de"
        Department:
          summary: "Department"
          value: "abrechnung@energieversorger.de"
      x-examples-i18n:
        de:
          Corporate: "Unternehmens-E-Mail"
          Personal: "Persönliche E-Mail"
          Department: "Abteilungs-E-Mail"

else:
  # AHB condition [322] / [940]: phone/fax must start with + then digits only
  description: |
    **TE / FX / AJ / AL (Telefon/Fax/Handy):**
    Value must start with `+` followed by digits only.
    AHB condition [940]: Die Zeichenkette muss mit dem Zeichen + beginnen
    und danach dürfen nur noch Ziffern folgen.
    **German:** AHB [940]: Telefon-/Faxnummer muss mit + beginnen, danach nur Ziffern.
  properties:
    value:
      type: string
      pattern: '^\+[0-9]+$'
      description: |
        Phone/fax number starting with `+` followed by digits only (AHB [940]).
        **German:** Telefon-/Faxnummer. Beginnt mit +, danach nur Ziffern (AHB [940]).
      x-i18n:
        de:
          description: Telefon-/Faxnummer. Beginnt mit +, danach nur Ziffern (AHB [940]).
      examples:
        Landline:
          summary: "Landline"
          value: "+4930123456789"
        Hotline:
          summary: "Hotline"
          value: "+498001234567"
        Mobile:
          summary: "Mobile"
          value: "+491701234567"
        Fax:
          summary: "Fax"
          value: "+4930123456780"
      x-examples-i18n:
        de:
          Landline: "Festnetz Berlin"
          Hotline: "Servicehotline (gebührenfrei)"
          Mobile: "Mobiltelefon"
          Fax: "Faxnummer Berlin"
