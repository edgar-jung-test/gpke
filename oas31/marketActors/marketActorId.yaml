type: object
title: MarketActorId
description: |
  Unique identification of a market participant (Marktpartner-Identifikation).
  In UTILMD, market participants are identified by their MP-ID (Marktpartner-ID),
  typically the EIC code or BDEW code, combined with the code scheme.
  Corresponds to EDIFACT NAD DE3039 (MP-ID) and DE3055 (code scheme qualifier).
  
  **German:** Eindeutige Identifikation eines Marktpartners (MP-ID).
  In der UTILMD werden Marktpartner über ihre MP-ID (Marktpartner-Identifikationsnummer),
  in der Regel ein EIC-Code oder BDEW-Code, zusammen mit dem Codesystem identifiziert.
  Entspricht EDIFACT NAD DE3039 (MP-ID) und DE3055 (Codesystem-Qualifier).
x-i18n:
  de:
    title: Marktpartner-Identifikation
    description: Eindeutige MP-ID eines Marktpartners mit Codesystem-Qualifier. EDIFACT NAD DE3039/DE3055.
x-edifact-mapping:
  segment: NAD
  de3039: "MP-ID (Marktpartner-ID)"
  de3055: "9 (GS1), 293 (BDEW/DE), 260 (DVGW)"
required:
  - id
  - codingScheme
properties:
  id:
    type: string
    maxLength: 50
    description: |
      Market participant identification number (MP-ID), typically an EIC or BDEW code.
      **German:** Marktpartner-Identifikationsnummer (MP-ID), in der Regel EIC- oder BDEW-Code.
    x-i18n:
      de:
        description: Marktpartner-Identifikationsnummer (MP-ID), z.B. EIC- oder BDEW-Code.
    examples:
      GridOperator:
        summary: "GridOperator"
        value: "9904132000002"
      Supplier:
        summary: "Supplier"
        value: "9900987654321"
      MSB:
        summary: "MSB"
        value: "9901234567890"
      BKV:
        summary: "BKV"
        value: "9905000012345"
    x-examples-i18n:
      de:
        GridOperator: "Netzbetreiber"
        Supplier: "Lieferant"
        MSB: "Messstellenbetreiber"
        BKV: "Bilanzkreisverantwortlicher"
  codingScheme:
    type: string
    description: |
      Code list qualifier identifying the coding scheme used for the MP-ID.
      Values: 9 (GS1/ILN), 293 (BDEW), 260 (DVGW).
      **German:** Qualifier des Codesystems für die MP-ID. Werte: 9 (GS1/ILN), 293 (BDEW), 260 (DVGW).
    x-i18n:
      de:
        description: Qualifier des Codesystems der MP-ID. 9=GS1, 293=BDEW, 260=DVGW.
    enum:
      - "9"
      - "293"
      - "260"
    examples:
      BDEW:
        summary: "BDEW"
        value: "293"
      GS1:
        summary: "GS1"
        value: "9"
      DVGW:
        summary: "DVGW"
        value: "260"
    x-examples-i18n:
      de:
        BDEW: "BDEW-Codesystem"
        GS1: "GS1-Codesystem"
        DVGW: "DVGW-Codesystem"
  label:
    $ref: "../common/multilingualLabel.yaml"
