type: object
title: TechnicalResource
description: |
  Technical resource (Technische Ressource / TR) – a physical generation or storage unit
  (e.g. photovoltaic system, wind turbine, battery storage) connected to the electricity
  network. Technical resources are associated with market locations and are managed by
  grid operators or operators. Corresponds to EDIFACT SG5 LOC+Z20 (TR).
  
  **German:** Technische Ressource (TR) – eine physische Erzeugungs- oder Speicheranlage
  (z.B. Photovoltaikanlage, Windkraftanlage, Batteriespeicher) am Stromnetz.
  Technische Ressourcen sind Marktlokationen zugeordnet und werden durch Netzbetreiber
  oder Betreiber verwaltet. Entspricht EDIFACT SG5 LOC+Z20 (TR).
x-i18n:
  de:
    title: Technische Ressource (TR)
    description: |
      Physische Erzeugungs-/Speicheranlage (z.B. PV, Wind, Speicher) am Netz.
      Zugeordnet zu Marktlokationen. EDIFACT SG5 LOC+Z20.
x-edifact-mapping:
  segment: LOC
  de3227: "Z20 (Technische Ressource)"
  de3225: "ID der technischen Ressource"
required:
  - externalId
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    example: 7001
  externalId:
    type: string
    maxLength: 50
    description: |
      External identifier of the technical resource (e.g. EEG-Anlagen-ID or MaStR-Nummer).
      **German:** Externe Identifikationsnummer der technischen Ressource (z.B. EEG-Anlagen-ID oder MaStR-Nummer).
    x-i18n:
      de:
        description: Externe Identifikationsnummer der TR, z.B. EEG-Anlagen-ID oder MaStR-Nummer.
    example: "SEE910456789012"
  gridOperatorActorId:
    type: integer
    nullable: true
    description: |
      Reference to the grid operator (NB) who manages this technical resource.
      **German:** Referenz auf den Netzbetreiber (NB), der diese technische Ressource verwaltet.
    x-i18n:
      de:
        description: Referenz auf den verwaltenden Netzbetreiber (NB).
    example: 42
  operatorActorId:
    type: integer
    nullable: true
    description: |
      Reference to the operator (BTR – Betreiber der technischen Ressource) who operates
      this technical resource.
      **German:** Referenz auf den Betreiber (BTR) der technischen Ressource.
    x-i18n:
      de:
        description: Referenz auf den Betreiber (BTR) der technischen Ressource.
    example: 43
  validity:
    $ref: "../../common/validity-period.yaml"
  label:
    $ref: "../../common/multilingual-label.yaml"
