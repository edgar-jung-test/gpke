type: object
title: TransformerDevice
description: |
  Transformer device / current/voltage transformer (Wandlereinrichtung) – a measurement
  transformer installed alongside a meter to extend its measurement range, e.g. current
  transformers (CT) or voltage transformers (VT) at medium/high voltage connections.
  Operated by the metering point operator (MSB).
  
  **German:** Wandlereinrichtung – ein Messtransformator, der zusammen mit einem Zähler
  installiert wird, um seinen Messbereich zu erweitern, z.B. Stromwandler (SW) oder
  Spannungswandler (SpW) bei Mittel-/Hochspannungsanschlüssen.
  Betrieben durch den Messstellenbetreiber (MSB).
x-i18n:
  de:
    title: Wandlereinrichtung
    description: |
      Messtransformator (Strom-/Spannungswandler) zur Messbereichserweiterung.
      Betrieben durch MSB. Typisch bei MS/HS-Anschlüssen.
required:
  - externalId
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    examples:
      First:
        summary: "First"
        value: 1
      Second:
        summary: "Second"
        value: 42
      Third:
        summary: "Third"
        value: 1001
    x-examples-i18n:
      de:
        First: "Erste Instanz"
        Second: "Zweite Instanz"
        Third: "Dritte Instanz"
  externalId:
    type: string
    maxLength: 80
    description: |
      External identifier of the transformer device.
      **German:** Externe Identifikationsnummer der Wandlereinrichtung.
    x-i18n:
      de:
        description: Externe Identifikationsnummer der Wandlereinrichtung.
    examples:
      CT1:
        summary: "CT1"
        value: "WE-0042-001"
      CT2:
        summary: "CT2"
        value: "WE-0042-002"
      VT1:
        summary: "VT1"
        value: "WE-1001-001"
    x-examples-i18n:
      de:
        CT1: "Stromwandler 1"
        CT2: "Stromwandler 2"
        VT1: "Spannungswandler 1"
  meterId:
    type: integer
    nullable: true
    description: |
      Reference to the meter this transformer device is connected to.
      **German:** Referenz auf den Zähler, mit dem diese Wandlereinrichtung verbunden ist.
    x-i18n:
      de:
        description: Referenz auf den zugehörigen Zähler.
    examples:
      Meter1:
        summary: "Meter1"
        value: 5001
      Meter2:
        summary: "Meter2"
        value: 5002
    x-examples-i18n:
      de:
        Meter1: "Meter1"
        Meter2: "Meter2"
  msbActorId:
    type: integer
    nullable: true
    description: |
      Reference to the MSB operating this transformer device.
      **German:** Referenz auf den MSB, der diese Wandlereinrichtung betreibt.
    x-i18n:
      de:
        description: Referenz auf den betreibenden MSB.
    examples:
      BasicMSB:
        summary: "BasicMSB"
        value: 42
      CompetitiveMSB:
        summary: "CompetitiveMSB"
        value: 55
      DefaultMSB:
        summary: "DefaultMSB"
        value: 99
    x-examples-i18n:
      de:
        BasicMSB: "Grundzuständiger MSB (gMSB)"
        CompetitiveMSB: "Wettbewerblicher MSB (wMSB)"
        DefaultMSB: "Auffangmessstellenbetreiber"
  validity:
    $ref: "../../common/validityPeriod.yaml"
  label:
    $ref: "../../common/multilingualLabel.yaml"
