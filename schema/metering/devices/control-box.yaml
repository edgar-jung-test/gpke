type: object
title: ControlBox
description: |
  Control box (Steuerbox) – an alternative control unit for remotely managing a
  controllable resource. Used where a traditional control device (Steuereinrichtung)
  is not applicable. Mutually exclusive with ControlDevice on a controllable resource.
  Used by the grid operator (NB) or feed-in manager (EIV).
  
  **German:** Steuerbox – eine alternative Steuereinheit zur Fernsteuerung einer
  steuerbaren Ressource. Wird eingesetzt, wo eine herkömmliche Steuereinrichtung
  nicht anwendbar ist. Schließt sich mit der Steuereinrichtung an einer steuerbaren
  Ressource aus. Verwendet durch den Netzbetreiber (NB) oder Einspeiseverantwortlichen (EIV).
x-i18n:
  de:
    title: Steuerbox
    description: |
      Alternative Steuereinheit für steuerbare Ressourcen.
      Schließt sich mit der Steuereinrichtung aus. Verwendet durch NB oder EIV.
required:
  - externalId
  - controllableResourceId
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    example: 10001
  externalId:
    type: string
    maxLength: 50
    description: |
      External identifier of the control box.
      **German:** Externe Identifikationsnummer der Steuerbox.
    x-i18n:
      de:
        description: Externe Identifikationsnummer der Steuerbox.
    example: "SB-00042-001"
  controllableResourceId:
    type: integer
    description: |
      Reference to the controllable resource this box controls.
      **German:** Referenz auf die steuerbare Ressource, die diese Steuerbox steuert.
    x-i18n:
      de:
        description: Referenz auf die gesteuerte steuerbare Ressource.
    example: 8001
  usedByNBActorId:
    type: integer
    nullable: true
    description: |
      Reference to the grid operator (NB) using this control box.
      **German:** Referenz auf den Netzbetreiber (NB), der diese Steuerbox verwendet.
    x-i18n:
      de:
        description: Referenz auf den Netzbetreiber (NB), der die Steuerbox nutzt.
    example: 42
  usedByEIVActorId:
    type: integer
    nullable: true
    description: |
      Reference to the feed-in manager (EIV) using this control box.
      **German:** Referenz auf den Einspeiseverantwortlichen (EIV), der diese Steuerbox verwendet.
    x-i18n:
      de:
        description: Referenz auf den Einspeiseverantwortlichen (EIV), der die Steuerbox nutzt.
    example: null
  validity:
    $ref: "../../common/validity-period.yaml"
  label:
    $ref: "../../common/multilingual-label.yaml"
