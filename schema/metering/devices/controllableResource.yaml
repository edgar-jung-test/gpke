type: object
title: ControllableResource
description: |
  Controllable resource (Steuerbare Ressource / SR) – a technical resource that can be
  remotely controlled (switched on/off or throttled) by the grid operator or feed-in
  manager. Each controllable resource is derived from a technical resource and must have
  either a control device (Steuereinrichtung) or a control box (Steuerbox).
  Corresponds to EDIFACT SG5 LOC+Z19 (SR).
  
  **German:** Steuerbare Ressource (SR) – eine technische Ressource, die durch den
  Netzbetreiber oder Einspeiseverantwortlichen ferngesteuert werden kann (ein-/ausschalten
  oder drosseln). Jede steuerbare Ressource leitet sich aus einer technischen Ressource
  ab und muss entweder eine Steuereinrichtung oder eine Steuerbox besitzen.
  Entspricht EDIFACT SG5 LOC+Z19 (SR).
x-i18n:
  de:
    title: Steuerbare Ressource (SR)
    description: |
      Fernsteuerbare technische Ressource (ein-/ausschalten, drosseln).
      Benötigt Steuereinrichtung oder Steuerbox. EDIFACT SG5 LOC+Z19.
x-edifact-mapping:
  segment: LOC
  de3227: "Z19 (Steuerbare Ressource)"
  de3225: "ID der steuerbaren Ressource"
required:
  - externalId
  - technicalResourceId
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    example: 8001
  externalId:
    type: string
    maxLength: 50
    description: |
      External identifier of the controllable resource.
      **German:** Externe Identifikationsnummer der steuerbaren Ressource.
    x-i18n:
      de:
        description: Externe Identifikationsnummer der steuerbaren Ressource.
    example: "SR-00042-001"
  technicalResourceId:
    type: integer
    description: |
      Reference to the underlying technical resource.
      **German:** Referenz auf die zugehörige technische Ressource.
    x-i18n:
      de:
        description: Referenz auf die zugehörige technische Ressource.
    example: 7001
  gridOperatorActorId:
    type: integer
    nullable: true
    description: |
      Reference to the grid operator (NB) who manages this controllable resource.
      **German:** Referenz auf den Netzbetreiber (NB), der diese steuerbare Ressource verwaltet.
    x-i18n:
      de:
        description: Referenz auf den verwaltenden Netzbetreiber (NB).
    example: 42
  eivActorId:
    type: integer
    nullable: true
    description: |
      Reference to the feed-in manager (EIV – Einspeiseverantwortlicher) who manages
      this controllable resource.
      **German:** Referenz auf den Einspeiseverantwortlichen (EIV), der diese steuerbare Ressource verwaltet.
    x-i18n:
      de:
        description: Referenz auf den Einspeiseverantwortlichen (EIV) der steuerbaren Ressource.
    example: 55
  validity:
    $ref: "../../common/validityPeriod.yaml"
  label:
    $ref: "../../common/multilingualLabel.yaml"
