type: object
title: TariffDevice
description: |
  Tariff device (Tarifeinrichtung) – a device connected to a meter that enables
  time-of-use tariff switching, e.g. a tariff switch relay or time switch for
  day/night tariff differentiation (HT/NT). Operated by the metering point operator (MSB).
  
  **German:** Tarifeinrichtung – ein am Zähler angeschlossenes Gerät, das eine
  zeitabhängige Tarifdifferenzierung ermöglicht, z.B. ein Tarifschaltrelais oder
  eine Zeitschaltuhr für die Hoch-/Niedertarif-Unterscheidung (HT/NT).
  Betrieben durch den Messstellenbetreiber (MSB).
x-i18n:
  de:
    title: Tarifeinrichtung
    description: |
      Gerät zur Tarifdifferenzierung am Zähler (HT/NT-Schaltung).
      Betrieben durch MSB.
required:
  - externalId
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    example: 14001
  externalId:
    type: string
    maxLength: 80
    description: |
      External identifier of the tariff device.
      **German:** Externe Identifikationsnummer der Tarifeinrichtung.
    x-i18n:
      de:
        description: Externe Identifikationsnummer der Tarifeinrichtung.
    example: "TE-0042-001"
  meterId:
    type: integer
    nullable: true
    description: |
      Reference to the meter this tariff device is connected to.
      **German:** Referenz auf den Zähler, mit dem diese Tarifeinrichtung verbunden ist.
    x-i18n:
      de:
        description: Referenz auf den zugehörigen Zähler.
    example: 5001
  msbActorId:
    type: integer
    nullable: true
    description: |
      Reference to the MSB operating this tariff device.
      **German:** Referenz auf den MSB, der diese Tarifeinrichtung betreibt.
    x-i18n:
      de:
        description: Referenz auf den betreibenden MSB.
    example: 42
  validity:
    $ref: "../../common/validityPeriod.yaml"
  label:
    $ref: "../../common/multilingualLabel.yaml"
