type: string
title: TransactionReason
description: |
  Transaction reason code (Transaktionsgrund / Transaktionsgrundergänzung) identifying
  the business case type of a UTILMD message. Corresponds to SG4 STS 9013 in EDIFACT.
  
  **German:** Transaktionsgrundcode (Transaktionsgrund / Transaktionsgrundergänzung) zur
  Identifikation des Geschäftsvorfalls einer UTILMD-Nachricht. Entspricht SG4 STS DE9013
  im EDIFACT-Format.
