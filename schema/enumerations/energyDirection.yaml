type: string
title: EnergyDirection
description: |
  Direction of energy flow at a market location – either consumption (import from grid)
  or generation (export to grid). Corresponds to EDIFACT LOC qualifier Z16/CCI characteristcs.
  
  **German:** Energieflussrichtung an einer Marktlokation – entweder Verbrauch (Bezug aus dem Netz)
  oder Erzeugung (Einspeisung ins Netz). Entspricht den LOC-Qualifier Z16-Charakteristiken in EDIFACT.
x-i18n:
  de:
    title: Energieflussrichtung
    description: Energieflussrichtung an einer Marktlokation – Verbrauch oder Erzeugung.
x-edifact-mapping:
  segment: CCI/CAV
  notes: "Differentiates consuming (verbrauchend) vs generating (erzeugend) MaLo"
enum:
  - CONSUMPTION
  - GENERATION
x-enum-descriptions:
  CONSUMPTION:
    en: "Consuming market location (energy flows from grid to customer)"
    de: "Verbrauchende Marktlokation – Energie fließt vom Netz zum Kunden"
  GENERATION:
    en: "Generating market location (energy flows from installation to grid)"
    de: "Erzeugende Marktlokation – Energie fließt von der Anlage ins Netz"
example: "CONSUMPTION"
