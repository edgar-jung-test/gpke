type: string
title: MeteringPointType
description: |
  Type of metering point classification defining how a market location's consumption
  or generation is determined. Corresponds to EDIFACT SG8 SEQ DE1229.
  
  **German:** Art der Messstellenklassifikation, die bestimmt, wie der Verbrauch oder
  die Erzeugung einer Marktlokation ermittelt wird. Entspricht EDIFACT SG8 SEQ DE1229.
