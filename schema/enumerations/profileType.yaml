type: string
title: ProfileType
description: |
  Load profile type assigned to a market location defining the method used to determine
  consumption quantities. Based on BDEW profile classification.
  
  **German:** Lastprofiltyp einer Marktlokation, der die Methode zur Verbrauchsermittlung
  beschreibt. Basierend auf BDEW-Profilklassifikation (SLP/SEP/TLP/TEP).
x-i18n:
  de:
    title: Lastprofiltyp
    description: Lastprofiltyp einer Marktlokation gemäß BDEW-Profilklassifikation.
enum:
  - SLP
  - SEP
  - TLP
  - TEP
  - RLM
x-enum-descriptions:
  SLP:
    en: "Standard load profile for consumption (Standardlastprofil Verbrauch)"
    de: "Standardlastprofil Verbrauch (SLP) – für kleinere Verbrauchsstellen"
  SEP:
    en: "Standard generation profile (Standardeinspeiseprofil)"
    de: "Standardeinspeiseprofil (SEP) – für kleinere Erzeugungsanlagen"
  TLP:
    en: "Day-time load profile for consumption (Tagesganglinienprofil Verbrauch)"
    de: "Tagesganglinienprofil Verbrauch (TLP)"
  TEP:
    en: "Day-time generation profile (Tagesganglinien-Einspeiseprofil)"
    de: "Tagesganglinien-Einspeiseprofil (TEP)"
  RLM:
    en: "Registered power measurement / metered (Registrierende Leistungsmessung)"
    de: "Registrierende Leistungsmessung (RLM) – für größere Verbrauchsstellen"
example: "SLP"
