  products:
    type: array
    description: |
      Products (configuration products) assigned to this grid location with validity periods.
      **German:** Dieser Netzlokation zugeordnete Produkte (Konfigurationsprodukte) mit Gültigkeitszeiträumen.
    x-i18n:
