type: object
title: GridLocation
description: |
  Grid location (Netzlokation / NeLo) – represents a physical connection point in the
  electricity distribution network. A grid location is the technical counterpart of a
  market location and describes the physical infrastructure (cable, transformer connection).
  A market location can have one or more upstream grid locations.
  Corresponds to EDIFACT SG5 LOC+Z18 and SG8 SEQ+ZD7 (informative grid location data).
  
  **German:** Netzlokation (NeLo) – repräsentiert einen physischen Anschlusspunkt im
  Stromverteilungsnetz. Die Netzlokation ist das technische Gegenstück zur Marktlokation
  und beschreibt die physische Infrastruktur (Kabelanschluss, Transformatoranbindung).
  Einer Marktlokation können eine oder mehrere vorgelagerte Netzlokationen zugeordnet sein.
  Entspricht EDIFACT SG5 LOC+Z18 und SG8 SEQ+ZD7.
x-i18n:
  de:
    title: Netzlokation (NeLo)
    description: |
      Physischer Netzanschlusspunkt im Verteilungsnetz.
      Technisches Gegenstück zur Marktlokation. EDIFACT SG5 LOC+Z18 und SG8 SEQ+ZD7.
x-edifact-mapping:
  segment: LOC
  de3227: "Z18 (Netzlokation)"
  de3225: "ID der Netzlokation"
required:
  - neLoId
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    examples:
      First:
        summary: "First"
        value: 1
      Second:
        summary: "Second"
        value: 42
      Third:
        summary: "Third"
        value: 1001
    x-examples-i18n:
      de:
        First: "Erste Instanz"
        Second: "Zweite Instanz"
        Third: "Dritte Instanz"
  neLoId:
    $ref: "./gridLocationId.yaml"
  gridAreaId:
    type: integer
    nullable: true
    description: |
      Reference to the grid area (Netzgebiet) this grid location belongs to.
      **German:** Referenz auf das Netzgebiet, zu dem diese Netzlokation gehört.
    x-i18n:
      de:
        description: Referenz auf das zugehörige Netzgebiet.
    examples:
      example1:
        summary: "Example1"
        value: 5
    x-examples-i18n:
      de:
        example1: "example1"
  address:
    $ref: "../../common/address.yaml"
  voltageLevel:
    $ref: "../../common/voltageLevel.yaml"
  hasControlChannel:
    type: boolean
    nullable: true
    description: |
      Indicates whether this grid location has a control channel (Steuerkanal) installed,
      e.g. for ripple control receivers or smart meter gateways.
      **German:** Gibt an, ob an dieser Netzlokation ein Steuerkanal vorhanden ist,
      z.B. für Rundsteuerempfänger oder Smart-Meter-Gateways.
    x-i18n:
      de:
        description: Gibt an, ob ein Steuerkanal (z.B. Rundsteuerempfänger, SMGW) vorhanden ist.
    examples:
      Yes:
        summary: "Yes"
        value: true
      No:
        summary: "No"
        value: false
    x-examples-i18n:
      de:
        Yes: "Yes"
        No: "No"
  assignedMeteringPointOperator:
    type: object
    nullable: true
    description: |
      The metering point operator (MSB) assigned to this grid location, including
      the operator type (basic, competitive, default).
      Corresponds to EDIFACT SG10 CCI+ZB3 / CAV+Z91 on NeLo level.
      **German:** Der dieser Netzlokation zugeordnete Messstellenbetreiber (MSB),
      einschließlich MSB-Typ (grundzuständig, wettbewerblich, Auffang).
      EDIFACT SG10 CCI+ZB3 / CAV+Z91 auf NeLo-Ebene.
    x-i18n:
      de:
        description: Zugeordneter Messstellenbetreiber inkl. MSB-Typ. EDIFACT SG10 CCI+ZB3/CAV+Z91.
    properties:
      actorId:
        $ref: "../../marketActors/marketActorId.yaml"
      operatorType:
