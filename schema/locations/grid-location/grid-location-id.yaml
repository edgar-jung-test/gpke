type: string
title: GridLocationId
description: |
  Unique identifier of a grid location (Netzlokations-ID / NeLo-ID).
  The NeLo-ID is an alphanumeric code assigned by the grid operator to identify
  a grid location (physical connection point in the distribution network).
  Corresponds to EDIFACT SG5 LOC DE3225 with qualifier Z18 (Netzlokation).
  
  **German:** Eindeutige Netzlokations-ID (NeLo-ID). Die NeLo-ID ist ein alphanumerischer
  Code, der vom Netzbetreiber vergeben wird und einen physischen Netzanschlusspunkt
  im Verteilungsnetz eindeutig identifiziert.
  Entspricht EDIFACT SG5 LOC DE3225 mit Qualifier Z18 (Netzlokation).
x-i18n:
  de:
    title: Netzlokations-ID (NeLo-ID)
    description: Alphanumerische NeLo-ID des Netzbetreibers für den physischen Netzanschlusspunkt. EDIFACT SG5 LOC DE3225, Z18.
x-edifact-mapping:
  segment: LOC
  de3227: "Z18 (Netzlokation)"
  de3225: "ID der Netzlokation"
  format: "Netzlokations-ID"
maxLength: 50
example: "DE0001234567890001NE000001S0A001"
