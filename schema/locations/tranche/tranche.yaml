type: object
title: Tranche
description: |
  Tranche (Tranche) – a partial quantity allocation of a generating market location,
  used to represent partial feed-in quantities for different suppliers or balancing groups.
  Relevant for business cases ZW1 (business case 2), ZW2 (business case 3), and ZX1 (case 4).
  Each tranche has a percentage share of the total generation.
  Corresponds to EDIFACT SG5 LOC+Z21 and SG8 SEQ+Z15 (percentage share).
  
  **German:** Tranche – Teilmengenzuordnung einer erzeugenden Marktlokation zur
  Darstellung von Teilmengen für verschiedene Lieferanten oder Bilanzkreise.
  Relevant für Geschäftsvorfälle ZW1 (GVF 2), ZW2 (GVF 3) und ZX1 (Fall 4).
  Jede Tranche hat einen prozentualen Anteil an der Gesamterzeugung.
  Entspricht EDIFACT SG5 LOC+Z21 und SG8 SEQ+Z15 (prozentualer Anteil).
