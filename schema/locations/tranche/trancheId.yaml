type: string
title: TrancheId
description: |
  Unique identifier of a tranche (Tranchen-ID). A tranche represents a partial quantity
  allocation at a generating market location. Used in the context of feed-in management
  and generation unit registration (business cases ZW1, ZW2, ZX1).
  Corresponds to EDIFACT SG5 LOC DE3225 with qualifier Z21 (Tranche).
  
  **German:** Eindeutige Tranchen-ID. Eine Tranche repräsentiert eine Teilmengen-
  zuordnung bei einer erzeugenden Marktlokation. Wird im Kontext des Einspeise-
  managements und der Anlagenzulassung verwendet (Geschäftsvorfälle ZW1, ZW2, ZX1).
  Entspricht EDIFACT SG5 LOC DE3225 mit Qualifier Z21 (Tranche).
x-i18n:
  de:
    title: Tranchen-ID
    description: Eindeutige Tranchen-ID für Teilmengenzuordnung bei erzeugenden MaLos. EDIFACT SG5 LOC DE3225, Z21.
