type: string
title: MeteringLocationId
description: |
  Unique identifier of a metering location (Messlokations-ID / MeLo-ID).
  The MeLo-ID identifies the physical measurement point in the network, where
  meters and measurement equipment are installed. Assigned by the metering point operator.
  Corresponds to EDIFACT SG5 LOC DE3225 with qualifier Z17 (Messlokation).
  
  **German:** Eindeutige Messlokations-ID (MeLo-ID). Die MeLo-ID identifiziert den
  physischen Messpunkt im Netz, an dem Zähler und Messeinrichtungen installiert sind.
  Vergeben durch den Messstellenbetreiber (MSB).
  Entspricht EDIFACT SG5 LOC DE3225 mit Qualifier Z17 (Messlokation).
x-i18n:
  de:
    title: Messlokations-ID (MeLo-ID)
    description: Eindeutige MeLo-ID des physischen Messpunkts, vergeben durch den MSB. EDIFACT SG5 LOC DE3225, Z17.
x-edifact-mapping:
  segment: LOC
  de3227: "Z17 (Messlokation)"
  de3225: "ID der Messlokation"
maxLength: 50
example: "DE0001234567890001ME000001S0A001"
