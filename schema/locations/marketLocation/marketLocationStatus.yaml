type: string
title: MarketLocationStatus
description: |
  Operational status of a market location. Indicates whether the market location
  is active, dormant, or disconnected.
  
  **German:** Betriebsstatus einer Marktlokation. Zeigt an, ob die Marktlokation
  aktiv, ruhend oder gesperrt ist.
x-i18n:
  de:
    title: Marktlokation-Status
    description: Betriebsstatus einer Marktlokation – aktiv, ruhend oder gesperrt.
enum:
  - ACTIVE
  - DORMANT
  - DISCONNECTED
  - DECOMMISSIONED
x-enum-descriptions:
  ACTIVE:
    en: "Market location is active and supplied"
    de: "Marktlokation ist aktiv und wird versorgt"
  DORMANT:
    en: "Dormant market location – no active supply (e.g. vacant, customer installation)"
    de: "Ruhende Marktlokation – keine aktive Versorgung (z.B. Leerstand, Kundenanlage gem. § 20 Abs. 1d EnWG)"
  DISCONNECTED:
    en: "Market location is disconnected (Sperrung)"
    de: "Marktlokation ist gesperrt (Sperrung)"
  DECOMMISSIONED:
    en: "Market location has been decommissioned and is no longer active"
    de: "Marktlokation wurde stillgelegt und ist nicht mehr aktiv"
examples:
  Active:
    summary: "Active"
    value: "ACTIVE"
  Dormant:
    summary: "Dormant"
    value: "DORMANT"
  Disconnected:
    summary: "Disconnected"
    value: "DISCONNECTED"
  Decommissioned:
    summary: "Decommissioned"
    value: "DECOMMISSIONED"
