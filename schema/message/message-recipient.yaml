type: object
title: MessageRecipient
description: |
  Receiving party of a UTILMD message. Corresponds to EDIFACT SG2 NAD with qualifier MR
  (message recipient). Contains the market participant ID (MP-ID) and coding scheme of
  the recipient.
  
  **German:** Empfangende Partei einer UTILMD-Nachricht. Entspricht EDIFACT SG2 NAD mit
  Qualifier MR (Nachrichtenempfänger). Enthält MP-ID und Codesystem des Empfängers.
x-i18n:
  de:
    title: Nachrichtenempfänger
    description: Empfangende Partei der UTILMD-Nachricht mit MP-ID. EDIFACT SG2 NAD, Qualifier MR.
x-edifact-mapping:
  segment: NAD (SG2)
  de3035: "MR (message recipient)"
  de3039: "MP-ID"
  de3055: "9 (GS1) oder 293 (BDEW)"
required:
  - actorId
  - marketRole
properties:
  actorId:
    $ref: "../market-actors/market-actor-id.yaml"
  marketRole:
    $ref: "../enumerations/market-role-code.yaml"
  label:
    $ref: "../common/multilingual-label.yaml"
