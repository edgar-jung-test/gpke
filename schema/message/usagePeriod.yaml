type: object
title: UsagePeriod
description: |
  Usage period of data (Verwendungszeitraum der Daten) – defines the time range for
  which master data or billing data is valid within a UTILMD transaction.
  A transaction can carry multiple usage periods with a period ID each.
  Used in master data change notifications (Stammdatenänderung) and billing data
  (Abrechnungsdaten) processes.
  Corresponds to EDIFACT SG6 RFF+Z49 (valid data) or RFF+Z53 (no data) with DE1156 (period ID).
  
  **German:** Verwendungszeitraum der Daten – definiert den Zeitraum, für den Stamm-
  oder Abrechnungsdaten innerhalb eines UTILMD-Vorgangs gültig sind.
  Ein Vorgang kann mehrere Verwendungszeiträume mit je einer Zeitraum-ID tragen.
  Genutzt in Stammdatenänderungsprozessen und Abrechnungsdatenprozessen.
  Entspricht EDIFACT SG6 RFF+Z49 (gültige Daten) oder RFF+Z53 (keine Daten) mit DE1156 (Zeitraum-ID).
x-i18n:
  de:
    title: Verwendungszeitraum der Daten
    description: |
      Gültigkeitszeitraum von Stamm- oder Abrechnungsdaten in einem UTILMD-Vorgang.
      EDIFACT SG6 RFF+Z49 (gültige Daten) oder RFF+Z53 (keine Daten) mit Zeitraum-ID DE1156.
x-edifact-mapping:
  segment: RFF (SG6)
  de1153: "Z49 (gültige Daten) oder Z53 (keine Daten)"
  de1154: "Zeitraum-ID (DE1156)"
  notes: "Used in Stammdaten and Abrechnungsdaten processes"
required:
  - periodId
  - dataAvailable
properties:
  periodId:
    type: integer
    minimum: 1
    description: |
      Period ID (Zeitraum-ID) uniquely identifying this usage period within the transaction.
      Must be a positive integer without decimal places.
      Corresponds to EDIFACT SG6 RFF DE1156.
      **German:** Zeitraum-ID zur eindeutigen Identifikation dieses Verwendungszeitraums
      innerhalb des Vorgangs. Muss positive ganze Zahl ohne Dezimalstellen sein.
      EDIFACT SG6 RFF DE1156.
    x-i18n:
      de:
        description: Zeitraum-ID des Verwendungszeitraums. Positive ganze Zahl. EDIFACT SG6 RFF DE1156.
    examples:
      First:
        summary: "First"
        value: 1
      Second:
        summary: "Second"
        value: 2
      Third:
        summary: "Third"
        value: 3
      Fourth:
        summary: "Fourth"
        value: 4
    x-examples-i18n:
      de:
        First: "Erste Instanz"
        Second: "Zweite Instanz"
        Third: "Dritte Instanz"
        Fourth: "Vierte Instanz"
  dataAvailable:
    type: boolean
    description: |
      Indicates whether data is available (true = Z49 valid data, false = Z53 no data).
      **German:** Gibt an, ob Daten vorhanden sind (true = Z49 gültige Daten, false = Z53 keine Daten).
    x-i18n:
      de:
        description: Gibt an ob Daten vorhanden. true=Z49 gültige Daten, false=Z53 keine Daten.
    examples:
      WithData:
        summary: "WithData"
        value: true
      NoData:
        summary: "NoData"
        value: false
    x-examples-i18n:
      de:
        WithData: "Daten vorhanden"
        NoData: "Keine Daten"
  validFrom:
    type: string
    format: date-time
    nullable: true
    description: |
      Start of the usage period (inclusive).
      Corresponds to EDIFACT DTM within SG6 with qualifier 163.
      **German:** Beginn des Verwendungszeitraums (einschließlich).
      EDIFACT DTM in SG6, Qualifier 163.
    x-i18n:
      de:
        description: Beginn des Verwendungszeitraums. EDIFACT DTM in SG6, Qualifier 163.
    examples:
      Q1Start:
        summary: "Q1Start"
        value: "2024-01-01T00:00:00Z"
      Q3Start:
        summary: "Q3Start"
        value: "2024-07-01T00:00:00Z"
      Q4Start:
        summary: "Q4Start"
        value: "2024-10-01T00:00:00Z"
    x-examples-i18n:
      de:
        Q1Start: "Beginn Q1"
        Q3Start: "Beginn Q3"
        Q4Start: "Beginn Q4"
  validTo:
    type: string
    format: date-time
    nullable: true
    description: |
      End of the usage period (exclusive).
      Corresponds to EDIFACT DTM within SG6 with qualifier 164.
      **German:** Ende des Verwendungszeitraums (ausschließlich).
      EDIFACT DTM in SG6, Qualifier 164.
    x-i18n:
      de:
        description: Ende des Verwendungszeitraums. EDIFACT DTM in SG6, Qualifier 164.
    examples:
      Q1End:
        summary: "Q1End"
        value: "2024-03-31T23:59:59Z"
      Q3End:
        summary: "Q3End"
        value: "2024-09-30T23:59:59Z"
      YearEnd:
        summary: "YearEnd"
        value: "2024-12-31T23:59:59Z"
    x-examples-i18n:
