type: object
title: MessageTransaction
description: |
  A single transaction (Vorgang) within a UTILMD message. Each UTILMD message can
  contain one or more transactions (SG4 IDE segments). A transaction describes one
  business process instance, e.g. one supplier change for one market location.
  Contains the transaction reference number, reason, and referenced location data.
  Corresponds to EDIFACT SG4 IDE (transaction identifier).
  
  **German:** Ein einzelner Vorgang innerhalb einer UTILMD-Nachricht. Jede UTILMD-Nachricht
  kann einen oder mehrere Vorgänge enthalten (SG4 IDE-Segmente). Ein Vorgang beschreibt
  eine Geschäftsvorfallinstanz, z.B. einen Lieferantenwechsel für eine Marktlokation.
  Enthält Vorgangsnummer, Transaktionsgrund und referenzierte Lokationsdaten.
  Entspricht EDIFACT SG4 IDE (Transaktionskennzeichen).
x-i18n:
  de:
    title: Vorgang (Transaktion)
    description: |
      Einzelner Geschäftsvorfall innerhalb einer UTILMD-Nachricht (SG4 IDE).
      Enthält Vorgangsnummer, Transaktionsgrund und Lokationsdaten.
x-edifact-mapping:
  segment: IDE (SG4)
  de7495: "24 (Transaktion)"
  de7402: "Vorgangsnummer"
required:
  - transactionId
  - transactionReason
properties:
  transactionId:
    type: string
    maxLength: 35
    description: |
      Unique transaction reference number (Vorgangsnummer) within the message.
      Corresponds to EDIFACT SG4 IDE DE7402.
      **German:** Eindeutige Vorgangsnummer innerhalb der Nachricht.
      Entspricht EDIFACT SG4 IDE DE7402.
    x-i18n:
      de:
        description: Eindeutige Vorgangsnummer innerhalb der Nachricht. EDIFACT SG4 IDE DE7402.
    example: "VG-2024-00001"
  transactionReason:
    $ref: "../enumerations/transaction-reason.yaml"
  transactionReasonSupplement:
    $ref: "../enumerations/location-bundle-type.yaml"
  startDate:
    type: string
    format: date-time
    nullable: true
    description: |
      Requested start date of the business process (e.g. delivery start date).
      Corresponds to EDIFACT SG4 DTM with qualifier 92 (start date) or 163.
      **German:** Gewünschtes Startdatum des Geschäftsvorfalls (z.B. Lieferbeginn).
      EDIFACT SG4 DTM Qualifier 92 oder 163.
    x-i18n:
      de:
        description: Gewünschtes Startdatum des Geschäftsvorfalls. EDIFACT SG4 DTM Qualifier 92/163.
    example: "2024-11-01T00:00:00Z"
  checkIdentifier:
    $ref: "./check-identifier.yaml"
  status:
    $ref: "./transaction-status.yaml"
  usagePeriod:
    $ref: "./usage-period.yaml"
  marketLocationId:
    $ref: "../locations/market-location/market-location-id.yaml"
  label:
    $ref: "../common/multilingual-label.yaml"
