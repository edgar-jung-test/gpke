  /market-locations:
    $ref: "./paths/marketLocations.yaml"
  /grid-locations:
    $ref: "./paths/gridLocations.yaml"
  /metering-locations:
    $ref: "./paths/meteringLocations.yaml"
  /market-actors:
    $ref: "./paths/marketActors.yaml"
  /messages:
    $ref: "./paths/messages.yaml"

