openapi: "3.0.3"
info:
  title: BDEW UTILMD Electricity Market API
  description: |
    OpenAPI 3.0 schema for the BDEW UTILMD (Utility Master Data) electricity market 
    communication standard. Based on the UTILMD Anwendungshandbuch (AHB) Strom Version 2.1,
    published by BDEW (Bundesverband der Energie- und Wasserwirtschaft e.V.).
    
    This API covers market processes for electricity including:
    - Market location (Marktlokation / MaLo) management
    - Grid location (Netzlokation / NeLo) management  
    - Metering location (Messlokation / MeLo) management
    - Market actor and role assignment
    - Metering device management
    - Location bundle structures
    - Message communication (EDIFACT UTILMD)
    
    **German:** API für die BDEW UTILMD Marktkommunikation Strom gemäß
    Anwendungshandbuch Version 2.1 (Stand: 11.12.2025).
  version: "2.1.0"
  contact:
    name: BDEW
    url: https://www.bdew-mako.de
  license:
    name: BDEW
    url: https://www.bdew-mako.de

servers:
  - url: https://api.example.com/utilmd/v2
    description: Production server

tags:
  - name: market-actors
    description: Market participants and their roles / Marktakteure und Rollen
  - name: market-locations
    description: Market locations (MaLo) / Marktlokationen
  - name: grid-locations
    description: Grid locations (NeLo) / Netzlokationen
  - name: metering-locations
    description: Metering locations (MeLo) / Messlokationen
  - name: tranches
    description: Tranches / Tranchen
  - name: metering-devices
    description: Metering devices / Messeinrichtungen
  - name: location-bundles
    description: Location bundle structures / Lokationsbündelstrukturen
  - name: messages
    description: UTILMD messages / UTILMD-Nachrichten
  - name: balancing
    description: Balancing areas and zones / Bilanzierungsgebiete und -kreise

