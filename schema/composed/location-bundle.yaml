type: object
title: LocationBundle
description: |
  Location bundle (Lokationsbündel) – the complete aggregated structure of all locations
  associated with a market location. This is the primary composed object for master data
  exchange in UTILMD. Contains a market location together with all its related grid locations,
  metering locations, technical resources, controllable resources, tranches, and the
  assigned market actors (NB, LF, MSB, BKV, EIV).
  
  The structure reflects the complete UTILMD SG5/SG8/SG10 segment group tree for one
  market location (SG4 IDE scope).

  **German:** Lokationsbündel – die vollständige aggregierte Struktur aller Lokationen
  einer Marktlokation. Dies ist das primäre zusammengesetzte Objekt für den Stammdaten-
  austausch in der UTILMD. Enthält eine Marktlokation zusammen mit allen zugehörigen
  Netzlokationen, Messlokationen, technischen Ressourcen, steuerbaren Ressourcen,
  Tranchen und zugeordneten Marktakteuren (NB, LF, MSB, BKV, EIV).
  
  Die Struktur spiegelt den vollständigen UTILMD SG5/SG8/SG10 Segmentgruppenbaum für
  eine Marktlokation (SG4-IDE-Scope) wider.
x-i18n:
  de:
    title: Lokationsbündel
    description: |
      Vollständige Stammdatenstruktur einer MaLo mit allen NeLos, MeLos, TRs, SRs,
      Tranchen und Marktakteuren. Spiegelt UTILMD SG5/SG8/SG10 wider.
x-edifact-mapping:
  scope: "SG4 IDE (one transaction = one location bundle)"
  segments: "SG5 LOC, SG6 RFF/DTM, SG8 SEQ/CCI/CAV, SG10 CCI/CAV"
required:
  - marketLocation
properties:
  marketLocation:
    $ref: "../locations/market-location/market-location.yaml"

  dormantStatus:
    description: |
      Dormant market location details, present when the market location is dormant (ZAP).
      **German:** Details zur ruhenden Marktlokation, vorhanden wenn MaLo ruhend (ZAP).
    x-i18n:
      de:
        description: Details zur ruhenden Marktlokation (ZAP), falls zutreffend.
    nullable: true
    $ref: "../locations/market-location/dormant-market-location.yaml"

  assignedSupplier:
    description: |
      The supplier (LF – Lieferant) currently assigned to this market location.
      **German:** Der dieser Marktlokation aktuell zugeordnete Lieferant (LF).
    x-i18n:
      de:
        description: Aktuell zugeordneter Lieferant (LF).
    nullable: true
    allOf:
      - $ref: "../market-actors/market-actor-id.yaml"

  assignedGridOperator:
    description: |
      The grid operator (NB – Netzbetreiber) responsible for this market location.
      **German:** Der für diese Marktlokation zuständige Netzbetreiber (NB).
    x-i18n:
      de:
        description: Zuständiger Netzbetreiber (NB).
    nullable: true
    allOf:
      - $ref: "../market-actors/market-actor-id.yaml"

  assignedMSB:
    description: |
      The metering point operator (MSB) assigned to this market location, including type.
      **German:** Der dieser Marktlokation zugeordnete Messstellenbetreiber (MSB) inkl. Typ.
    x-i18n:
      de:
        description: Zugeordneter Messstellenbetreiber (MSB) inkl. Typ.
    nullable: true
    type: object
    properties:
      actorId:
        $ref: "../market-actors/market-actor-id.yaml"
      operatorType:
        $ref: "../enumerations/meter-operator-type.yaml"
      validity:
        $ref: "../common/validity-period.yaml"

  gridLocations:
    type: array
    description: |
      All grid locations (NeLo) upstream of this market location within the bundle.
      **German:** Alle vorgelagerten Netzlokationen (NeLo) dieser Marktlokation im Bündel.
    x-i18n:
      de:
        description: Alle vorgelagerten Netzlokationen (NeLo) im Lokationsbündel.
    items:
      $ref: "../locations/grid-location/grid-location.yaml"

  meteringLocations:
    type: array
    description: |
      All metering locations (MeLo) associated with this market location within the bundle.
      **German:** Alle Messlokationen (MeLo), die dieser Marktlokation im Bündel zugeordnet sind.
    x-i18n:
      de:
        description: Alle zugeordneten Messlokationen (MeLo) im Lokationsbündel.
    items:
      $ref: "../locations/metering-location/metering-location.yaml"

  technicalResources:
    type: array
    description: |
      Technical resources (TR) associated with this market location.
      **German:** Der Marktlokation zugeordnete technische Ressourcen (TR).
    x-i18n:
      de:
        description: Der Marktlokation zugeordnete technische Ressourcen (TR).
    items:
      $ref: "../metering/devices/technical-resource.yaml"

  controllableResources:
    type: array
    description: |
      Controllable resources (SR) derived from the technical resources of this market location.
      **German:** Steuerbare Ressourcen (SR), die aus den technischen Ressourcen dieser MaLo abgeleitet sind.
    x-i18n:
      de:
        description: Steuerbare Ressourcen (SR) der Marktlokation.
    items:
      $ref: "../metering/devices/controllable-resource.yaml"

  tranches:
    type: array
    description: |
      Tranches defined for this market location (relevant for generating locations with
      partial quantity allocations, business cases ZW1/ZW2/ZX1).
      **German:** Tranchen dieser Marktlokation (relevant für erzeugende Lokationen mit
      Teilmengenzuordnungen, Geschäftsvorfälle ZW1/ZW2/ZX1).
    x-i18n:
      de:
        description: Tranchen der Marktlokation für Teilmengenzuordnungen (GVF ZW1/ZW2/ZX1).
    items:
      $ref: "../locations/tranche/tranche.yaml"

  products:
    type: array
    description: |
      Configuration products assigned to this market location.
      **German:** Dieser Marktlokation zugeordnete Konfigurationsprodukte.
    x-i18n:
      de:
        description: Der Marktlokation zugeordnete Konfigurationsprodukte.
    items:
      allOf:
        - $ref: "../common/product.yaml"
        - type: object
          properties:
            validity:
              $ref: "../common/validity-period.yaml"

  obisCodes:
    type: array
    description: |
      OBIS codes assigned to this market location.
      **German:** Dieser Marktlokation zugeordnete OBIS-Kennzahlen.
    x-i18n:
      de:
        description: Der Marktlokation zugeordnete OBIS-Kennzahlen.
    items:
      $ref: "../common/obis-code.yaml"

  bundleType:
    $ref: "../enumerations/location-bundle-type.yaml"

  validity:
    $ref: "../common/validity-period.yaml"
