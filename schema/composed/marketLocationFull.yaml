type: object
title: MarketLocationFull
description: |
  Full market location API response object combining all master data relevant to a
  single market location. Suitable for use in GET /market-locations/{maLoId} responses.
  Aggregates the market location with its address, voltage level, balancing assignments,
  profile, products, OBIS codes, and all assigned market actors.
  
  **German:** Vollständiges Marktlokations-API-Antwortobjekt, das alle Stammdaten einer
  Marktlokation kombiniert. Geeignet für GET /market-locations/{maLoId} Antworten.
  Aggregiert die Marktlokation mit Adresse, Spannungsebene, Bilanzierungszuordnungen,
  Profil, Produkten, OBIS-Kennzahlen und allen zugeordneten Marktakteuren.
x-i18n:
  de:
    title: Marktlokation (vollständig)
    description: |
      Vollständiges Stammdatenobjekt einer Marktlokation für API-Antworten.
      Enthält alle Zuordnungen, Akteure, Produkte und OBIS-Kennzahlen.
required:
  - maLoId
properties:
  maLoId:
    $ref: "../locations/marketLocation/marketLocationId.yaml"

  address:
    $ref: "../common/address.yaml"

  voltageLevel:
    $ref: "../common/voltageLevel.yaml"

  energyDirection:
    $ref: "../enumerations/energyDirection.yaml"

  status:
    $ref: "../locations/marketLocation/marketLocationStatus.yaml"

  bundleType:
    $ref: "../enumerations/locationBundleType.yaml"

  profile:
    $ref: "../locations/marketLocation/marketLocationProfile.yaml"

  balancingAreaCode:
    type: string
    nullable: true
    description: |
      EIC code of the balancing area (Bilanzierungsgebiet) this market location is assigned to.
      **German:** EIC-Code des Bilanzierungsgebiets, dem diese Marktlokation zugeordnet ist.
    x-i18n:
      de:
        description: EIC-Code des zugeordneten Bilanzierungsgebiets.
    examples:
      TenneT:
        summary: "TenneT"
        value: "11YE-VE-------U"
      FiftyHertz:
        summary: "FiftyHertz"
        value: "11YDE-50HZ----O"
      Amprion:
        summary: "Amprion"
        value: "11YDE-AMPRION-P"
    x-examples-i18n:
      de:
        TenneT: "TenneT-Regelzone / -Bilanzierungsgebiet"
        FiftyHertz: "50Hertz-Regelzone / -Bilanzierungsgebiet"
        Amprion: "Amprion-Regelzone / -Bilanzierungsgebiet"

  balancingGroupCode:
    type: string
    nullable: true
    description: |
      EIC code of the balancing group (Bilanzkreis) this market location is assigned to.
      **German:** EIC-Code des Bilanzkreises, dem diese Marktlokation zugeordnet ist.
    x-i18n:
      de:
        description: EIC-Code des zugeordneten Bilanzkreises.
    examples:
      SupplierA:
        summary: "SupplierA"
        value: "11XBKV-MUSTER-K"
      SupplierB:
        summary: "SupplierB"
        value: "11XBKV-ENERGY-L"
    x-examples-i18n:
      de:
        SupplierA: "Lieferant A"
        SupplierB: "Lieferant B"

  packageId:
    type: string
    nullable: true
    description: |
      Package ID for interruptible loads or product packages (Paket-ID).
      **German:** Paket-ID für unterbrechbare Verbrauchseinrichtungen oder Produktpakete.
    x-i18n:
      de:
        description: Paket-ID für Produktpakete oder unterbrechbare Verbrauchseinrichtungen.
    examples:
      Pkg1:
        summary: "Pkg1"
        value: "PKT-00042"
      Pkg2:
        summary: "Pkg2"
        value: "PKT-10001"
    x-examples-i18n:
      de:
        Pkg1: "Paket 1"
        Pkg2: "Paket 2"

  assignedSupplier:
    description: |
      The supplier (LF) currently assigned to this market location with validity.
      **German:** Der aktuell zugeordnete Lieferant (LF) mit Gültigkeitszeitraum.
    x-i18n:
      de:
        description: Aktuell zugeordneter Lieferant (LF) mit Gültigkeitszeitraum.
    nullable: true
    type: object
    properties:
      actorId:
        $ref: "../marketActors/marketActorId.yaml"
      validity:
        $ref: "../common/validityPeriod.yaml"

  assignedMSB:
    description: |
      The metering point operator (MSB) assigned to this market location with type and validity.
      **German:** Zugeordneter Messstellenbetreiber (MSB) mit Typ und Gültigkeitszeitraum.
    x-i18n:
      de:
        description: Zugeordneter MSB mit Typ und Gültigkeitszeitraum.
    nullable: true
    type: object
    properties:
      actorId:
        $ref: "../marketActors/marketActorId.yaml"
      operatorType:
        $ref: "../enumerations/meterOperatorType.yaml"
      validity:
        $ref: "../common/validityPeriod.yaml"

  assignedGridOperator:
    description: |
      The grid operator (NB) responsible for this market location.
      **German:** Zuständiger Netzbetreiber (NB) dieser Marktlokation.
    x-i18n:
      de:
        description: Zuständiger Netzbetreiber (NB).
    nullable: true
    allOf:
      - $ref: "../marketActors/marketActorId.yaml"

  products:
    type: array
    description: |
      Products and configuration products assigned to this market location.
      **German:** Der Marktlokation zugeordnete Produkte und Konfigurationsprodukte.
    x-i18n:
      de:
        description: Zugeordnete Produkte und Konfigurationsprodukte.
    items:
      allOf:
        - $ref: "../common/product.yaml"
        - type: object
          properties:
            validity:
              $ref: "../common/validityPeriod.yaml"

  obisCodes:
    type: array
    description: |
      OBIS codes assigned to this market location.
      **German:** Der Marktlokation zugeordnete OBIS-Kennzahlen.
    x-i18n:
      de:
        description: Zugeordnete OBIS-Kennzahlen.
    items:
      $ref: "../common/obisCode.yaml"

  validity:
    $ref: "../common/validityPeriod.yaml"
