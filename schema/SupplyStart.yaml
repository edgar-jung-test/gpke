type: object
required:
- supplyStartId
- status
- createdAt
- updatedAt
- header
- supplyStartDate
- transactionReason
- marketLocationIdentification
- balancing
- isHouseholdCustomer
properties:
  supplyStartId:
    type: string
    description: Unique supply start request ID
    x-de: Eindeutige Lieferbeginn-Anfrage-ID
  status:
    $ref: ./SupplyStartStatus.yaml
  createdAt:
    type: string
    format: date-time
    description: Resource creation timestamp
    x-de: Erstellzeitpunkt
  updatedAt:
    type: string
    format: date-time
    description: Last update timestamp
    x-de: Letzte Änderung
  header:
    $ref: ./MessageHeader.yaml
  supplyStartDate:
    type: string
    format: date
    description: Requested supply start date (Anmeldedatum)
    x-de: Gewünschtes Lieferbeginn-Datum (Anmeldedatum)
  transactionReason:
    $ref: ./TransactionReason.yaml
  isHouseholdCustomer:
    type: boolean
    description: Whether the end customer is a household customer
    x-de: Haushaltskunde (ja/nein)
  marketLocationIdentification:
    $ref: ./MarketLocationIdentification.yaml
  balancing:
    $ref: ./BalancingData.yaml
  meterReadingCycle:
    $ref: ./MeterReadingCycle.yaml
  requestedStartDateForNewConnection:
    type: string
    format: date
    nullable: true
    description: Estimated supply start date for a new connection
    x-de: Voraussichtliches Lieferbeginn-Datum bei Neuanlage
  effectiveSupplyStartDate:
    type: string
    format: date
    nullable: true
    description: Confirmed/Effective supply start date (if known)
    x-de: Bestätigtes/Wirkendes Lieferbeginn-Datum (falls bekannt)
  rejectionReasons:
    type: array
    nullable: true
    items:
      $ref: ./RejectionReason.yaml
    description: Reasons if rejected
    x-de: Ablehnungsgründe (falls abgelehnt)
  notes:
    type: string
    nullable: true
    description: Free-text notes
    x-de: Freitext-Notizen
