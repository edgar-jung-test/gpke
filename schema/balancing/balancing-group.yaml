type: object
title: BalancingGroup
description: |
  Balancing group (Bilanzkreis) – a logical accounting unit within a balancing area
  managed by a balance responsible party (BKV – Bilanzkreisverantwortlicher).
  Market locations are assigned to a balancing group for settlement and balancing energy
  settlement purposes. Each balancing group is identified by an EIC code.
  
  **German:** Bilanzkreis – eine logische Abrechnungseinheit innerhalb eines
  Bilanzierungsgebiets, die von einem Bilanzkreisverantwortlichen (BKV) bewirtschaftet wird.
  Marktlokationen werden einem Bilanzkreis zur Abrechnung und Ausgleichsenergieabrechnung
  zugeordnet. Jeder Bilanzkreis wird durch einen EIC-Code identifiziert.
x-i18n:
  de:
    title: Bilanzkreis
    description: |
      Logische Abrechnungseinheit im Bilanzierungsgebiet, bewirtschaftet durch BKV.
      MaLos werden einem Bilanzkreis zugeordnet. Identifiziert durch EIC-Code.
required:
  - code
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    example: 19001
  code:
    type: string
    maxLength: 50
    description: |
      Unique EIC code of the balancing group.
      **German:** Eindeutiger EIC-Code des Bilanzkreises.
    x-i18n:
      de:
        description: Eindeutiger EIC-Code des Bilanzkreises.
    example: "11XBKV-MUSTER-K"
  name:
    type: string
    maxLength: 200
    nullable: true
    description: |
      Name of the balancing group.
      **German:** Name des Bilanzkreises.
    x-i18n:
      de:
        description: Name des Bilanzkreises.
    example: "Bilanzkreis Musterlieferant"
  balancingAreaId:
    type: integer
    nullable: true
    description: |
      Reference to the balancing area (Bilanzierungsgebiet) this balancing group belongs to.
      **German:** Referenz auf das Bilanzierungsgebiet, zu dem dieser Bilanzkreis gehört.
    x-i18n:
      de:
        description: Referenz auf das übergeordnete Bilanzierungsgebiet.
    example: 18001
  managedByActorId:
    type: integer
    nullable: true
    description: |
      Reference to the balance responsible party (BKV) who manages this balancing group.
      **German:** Referenz auf den Bilanzkreisverantwortlichen (BKV), der diesen Bilanzkreis bewirtschaftet.
    x-i18n:
      de:
        description: Referenz auf den Bilanzkreisverantwortlichen (BKV).
    example: 60
  label:
    $ref: "../common/multilingual-label.yaml"
