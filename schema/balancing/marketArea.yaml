type: object
title: MarketArea
description: |
  Market area (Marktgebiet) – a geographic zone within the gas/electricity market
  managed by a market area manager (MGV – Marktgebietsverantwortlicher). Contains
  a virtual trading point and network accounts (Netzkonten) for balancing.
  Primarily used in gas market communication but referenced in electricity for UNB/ÜNB contexts.
  
  **German:** Marktgebiet – eine geographische Zone im Energie-Markt, verwaltet durch
  den Marktgebietsverantwortlichen (MGV). Enthält einen virtuellen Handelspunkt und
  Netzkonten für die Bilanzierung. Primär im Gasmarkt genutzt, im Strommarkt für
  UNB/ÜNB-Kontexte referenziert.
x-i18n:
  de:
    title: Marktgebiet
    description: |
      Geographische Marktzone, verwaltet durch MGV.
      Enthält virtuellen Handelspunkt und Netzkonten.
required:
  - code
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    examples:
      First:
        summary: "First"
        value: 1
      Second:
        summary: "Second"
        value: 42
      Third:
        summary: "Third"
        value: 1001
  code:
    type: string
    maxLength: 50
    description: |
      Unique code of the market area.
      **German:** Eindeutiger Code des Marktgebiets.
    x-i18n:
      de:
        description: Eindeutiger Code des Marktgebiets.
    examples:
      Germany:
        summary: "Germany"
        value: "MARKET-DE-1"
      Austria:
        summary: "Austria"
        value: "MARKET-AT-1"
  name:
    type: string
    maxLength: 200
    nullable: true
    description: |
      Name of the market area.
      **German:** Name des Marktgebiets.
    x-i18n:
      de:
        description: Name des Marktgebiets.
    examples:
      THE:
        summary: "THE"
        value: "Trading Hub Europe"
      Austria:
        summary: "Austria"
        value: "Marktgebiet Ost (Österreich)"
  virtualTradingPointActorId:
    type: integer
    nullable: true
    description: |
      Reference to the virtual trading point manager (MGV) of this market area.
      **German:** Referenz auf den Marktgebietsverantwortlichen (MGV) / virtuellen Handelspunkt.
    x-i18n:
      de:
        description: Referenz auf den Marktgebietsverantwortlichen (MGV).
    examples:
      MGV1:
        summary: "MGV1"
        value: 65
      MGV2:
        summary: "MGV2"
        value: 66
  label:
    $ref: "../common/multilingualLabel.yaml"
