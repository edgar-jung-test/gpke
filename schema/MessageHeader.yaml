type: object
required:
- messageId
- createdAt
- senderMarketPartnerId
- receiverMarketPartnerId
properties:
  messageId:
    type: string
    description: Unique message identifier
    x-de: Eindeutige Nachrichten-ID
  createdAt:
    type: string
    format: date-time
    description: Message creation timestamp
    x-de: Erstellzeitpunkt der Nachricht
  senderMarketPartnerId:
    type: string
    description: Market partner ID of the sender (e.g., supplier)
    x-de: Marktpartner-ID des Senders (z. B. Lieferant)
  receiverMarketPartnerId:
    type: string
    description: Market partner ID of the receiver (e.g., DSO)
    x-de: Marktpartner-ID des Empfängers (z. B. Netzbetreiber)
  process:
    type: string
    nullable: true
    description: Process name (e.g., Lieferbeginn)
    x-de: Prozessname (z. B. Lieferbeginn)
  version:
    type: string
    nullable: true
    description: Message/process version
    x-de: Nachrichten-/Prozessversion
