type: object
required:
  - identificationMode
properties:
  identificationMode:
    type: string
    description: How the market location is identified
    x-de: Art der Identifikation der Marktlokation
    enum:
      - maloIdOnly
      - multiAttribute
  maloId:
    type: string
    nullable: true
    description: Market location ID (MaLo-ID)
    x-de: Marktlokations-ID (MaLo-ID)
  meterNumber:
    type: string
    nullable: true
    description: Meter number (Zählernummer)
    x-de: Zählernummer
  address:
    $ref: ./PostalAddress.yaml
  customer:
    $ref: ./CustomerReference.yaml
allOf:
  - if:
      properties:
        identificationMode:
          const: maloIdOnly
    then:
      required:
        - maloId
  - if:
      properties:
        identificationMode:
          const: multiAttribute
    then:
      required:
        - address
