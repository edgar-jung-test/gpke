type: object
title: Gateway
description: |
  Smart meter gateway (SMGW / Gateway) – the central communication unit in a modern
  metering system (mME). The gateway securely collects and transmits meter readings
  and enables remote access to metering data. Operated by the metering point operator (MSB).
  A gateway can be connected to one or more meters.
  
  **German:** Smart-Meter-Gateway (SMGW / Gateway) – die zentrale Kommunikationseinheit
  in einem modernen Messsystem (mME). Das Gateway erfasst und übermittelt sicher
  Zählerstände und ermöglicht den Fernzugriff auf Messdaten.
  Betrieben durch den Messstellenbetreiber (MSB). Ein Gateway kann mit einem
  oder mehreren Zählern verbunden sein.
x-i18n:
  de:
    title: Smart-Meter-Gateway (SMGW)
    description: |
      Kommunikationseinheit des modernen Messsystems (mME).
      Betrieben vom MSB. Verbunden mit einem oder mehreren Zählern.
required:
  - deviceNumber
properties:
  id:
    type: integer
    readOnly: true
    description: |
      Internal system identifier.
      **German:** Interner Systemidentifikator.
    x-i18n:
      de:
        description: Interner Systemidentifikator.
    examples:
      First:
        summary: "First"
        value: 1
      Second:
        summary: "Second"
        value: 42
      Third:
        summary: "Third"
        value: 1001
  deviceNumber:
    type: string
    maxLength: 80
    description: |
      Unique device number of the smart meter gateway assigned by the MSB.
      **German:** Eindeutige Gerätenummer des Smart-Meter-Gateways, vergeben durch den MSB.
    x-i18n:
      de:
        description: Eindeutige Gerätenummer des SMGW, vergeben durch den MSB.
    examples:
      Vendor1:
        summary: "Vendor1"
        value: "SMGW-1234567890"
      Vendor2:
        summary: "Vendor2"
        value: "GW-EMH-9876543"
      Vendor3:
        summary: "Vendor3"
        value: "ISKRA-SMGW-0001"
  msbActorId:
    type: integer
    nullable: true
    description: |
      Reference to the metering point operator (MSB) who operates this gateway.
      **German:** Referenz auf den Messstellenbetreiber (MSB), der dieses Gateway betreibt.
    x-i18n:
      de:
        description: Referenz auf den Messstellenbetreiber (MSB) dieses Gateways.
    examples:
      BasicMSB:
        summary: "BasicMSB"
        value: 42
      CompetitiveMSB:
        summary: "CompetitiveMSB"
        value: 55
      DefaultMSB:
        summary: "DefaultMSB"
        value: 99
  connectedMeterIds:
    type: array
    description: |
      List of meter IDs connected to this gateway.
      **German:** Liste der Zähler-IDs, die mit diesem Gateway verbunden sind.
    x-i18n:
      de:
        description: Liste der mit diesem Gateway verbundenen Zähler-IDs.
    items:
      type: integer
    examples:
      example1:
        summary: "Example1"
        value: "[5001, 5002]"
  validity:
    $ref: "../../common/validityPeriod.yaml"
  label:
    $ref: "../../common/multilingualLabel.yaml"
