type: object
title: CommunicationContact
description: |
  Communication contact details for a market participant, including contact person
  name and communication channels (email, phone, fax).
  Corresponds to EDIFACT SG3 CTA (contact information) and COM (communication contact) segments.
  
  **German:** Kommunikationsverbindung eines Marktpartners mit Ansprechpartner und
  Kommunikationskanälen (E-Mail, Telefon, Fax).
  Entspricht EDIFACT SG3 CTA (Kontaktinformation) und COM (Kommunikationsverbindung).
x-i18n:
  de:
    title: Kommunikationsverbindung / Ansprechpartner
    description: Ansprechpartner und Kommunikationskanäle eines Marktpartners. EDIFACT SG3 CTA/COM.
x-edifact-mapping:
  segment: "CTA (SG3)"
  de3139: "IC (Informationskontakt)"
  de3412: "Name des Ansprechpartners"
properties:
  contactType:
    type: string
    description: |
      Contact type qualifier. IC = Information contact.
      Corresponds to EDIFACT CTA DE3139.
      **German:** Kontakttyp-Qualifier. IC = Informationskontakt. EDIFACT CTA DE3139.
    x-i18n:
      de:
        description: Kontakttyp-Qualifier. IC = Informationskontakt. EDIFACT CTA DE3139.
    enum:
      - IC
    default: IC
    examples:
      InfoContact:
        summary: "InfoContact"
        value: "IC"
    x-examples-i18n:
      de:
        InfoContact: "Informationskontakt"
  contactName:
    type: string
    maxLength: 256
    nullable: true
    description: |
      Name of the contact person.
      Corresponds to EDIFACT CTA DE3412.
      **German:** Name des Ansprechpartners. Entspricht EDIFACT CTA DE3412.
    x-i18n:
      de:
        description: Name des Ansprechpartners. EDIFACT CTA DE3412.
    examples:
      PersonName:
        summary: "PersonName"
        value: "Max Mustermann"
      TeamName:
        summary: "TeamName"
        value: "Marktkommunikation"
      DeptName:
        summary: "DeptName"
        value: "Messwesen und Abrechnung"
    x-examples-i18n:
      de:
        PersonName: "Name einer Person"
        TeamName: "Teambezeichnung"
        DeptName: "Abteilungsbezeichnung"
  email:
    type: string
    format: email
    maxLength: 200
    nullable: true
    description: |
      Email address. String must contain '@' and '.'.
      Corresponds to EDIFACT COM DE3148 with DE3155=EM.
      **German:** E-Mail-Adresse. Zeichenkette muss '@' und '.' enthalten.
      EDIFACT COM DE3148, DE3155=EM.
    x-i18n:
      de:
        description: E-Mail-Adresse. Pflicht wenn EM. EDIFACT COM DE3148, DE3155=EM.
    examples:
      Personal:
        summary: "Personal"
        value: "max.mustermann@stadtwerke.de"
      Department:
        summary: "Department"
        value: "marktkommunikation@netzbetreiber.de"
    x-examples-i18n:
      de:
        Personal: "Persönliche E-Mail"
        Department: "Abteilungs-E-Mail"
  phone:
    type: string
    maxLength: 50
    nullable: true
    description: |
      Telephone number. Must start with '+' followed by digits only.
      Corresponds to EDIFACT COM DE3148 with DE3155=TE.
      **German:** Telefonnummer. Beginnt mit '+', danach nur Ziffern. EDIFACT COM, DE3155=TE.
    x-i18n:
      de:
        description: Telefonnummer. Beginnt mit '+'. EDIFACT COM DE3148, DE3155=TE.
    pattern: '^\+[0-9]+$'
    examples:
      Direct:
        summary: "Direct"
        value: "+4930123456789"
      Extension:
        summary: "Extension"
        value: "+4989987654321"
    x-examples-i18n:
      de:
        Direct: "Durchwahl"
        Extension: "Nebenstelle"
  fax:
    type: string
    maxLength: 50
    nullable: true
    description: |
      Fax number. Must start with '+' followed by digits only.
      Corresponds to EDIFACT COM DE3148 with DE3155=FX.
      **German:** Faxnummer. Beginnt mit '+', danach nur Ziffern. EDIFACT COM, DE3155=FX.
    x-i18n:
      de:
        description: Faxnummer. Beginnt mit '+'. EDIFACT COM DE3148, DE3155=FX.
    pattern: '^\+[0-9]+$'
    examples:
      Office:
        summary: "Office"
        value: "+4930123456780"
      Dept:
        summary: "Dept"
        value: "+4989987654320"
    x-examples-i18n:
      de:
        Office: "Bürofax"
        Dept: "Abteilungsfax"
  mobile:
    type: string
    maxLength: 50
    nullable: true
    description: |
      Mobile phone number. Corresponds to EDIFACT COM DE3148 with DE3155=AL.
      **German:** Mobilfunknummer. EDIFACT COM DE3148, DE3155=AL.
    x-i18n:
      de:
        description: Mobilfunknummer. EDIFACT COM DE3148, DE3155=AL.
    pattern: '^\+[0-9]+$'
    examples:
      WorkMobile:
        summary: "WorkMobile"
        value: "+491701234567"
      OnCall:
        summary: "OnCall"
        value: "+491629876543"
    x-examples-i18n:
      de:
        WorkMobile: "Diensthandy"
        OnCall: "Bereitschaftshandy"
