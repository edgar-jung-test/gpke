type: object
title: ObisCode
description: |
  OBIS (Object Identification System) code identifying a specific measurement value
  at a metering or market location. OBIS codes are standardized identifiers for
  energy quantities as defined in IEC 62056-21.
  
  **German:** OBIS-Kennzahl (Object Identification System) zur eindeutigen Identifikation
  eines Messwerts an einer Mess- oder Marktlokation. Standardisiert gemäß IEC 62056-21
  und BDEW-Codeliste.
x-i18n:
  de:
    title: OBIS-Kennzahl
    description: OBIS-Kennzahl zur eindeutigen Identifikation eines Messwerts. Standard IEC 62056-21.
x-edifact-mapping:
  segment: PIA / CCI
  notes: "Used in SG8/SG10 for measurement value identification"
required:
  - code
properties:
  code:
    type: string
    maxLength: 32
    pattern: '^[0-9]{1,2}-[0-9]{1,2}:[0-9]{1,2}\.[0-9]{1,2}\.[0-9]{1,2}(\*[0-9]{1,2})?$'
    description: |
      OBIS code in standard notation (e.g. 1-1:1.8.0 for active energy import total).
      **German:** OBIS-Kennzahl in Standardnotation (z.B. 1-1:1.8.0 für Wirkenergie Bezug gesamt).
    x-i18n:
      de:
        description: OBIS-Kennzahl in Standardnotation, z.B. 1-1:1.8.0 für Wirkenergie Bezug gesamt.
    examples:
      ActiveEnergyImport:
        summary: "ActiveEnergyImport"
        value: "1-1:1.8.0"
      ActiveEnergyExport:
        summary: "ActiveEnergyExport"
        value: "1-1:2.8.0"
      ReactiveEnergyImport:
        summary: "ReactiveEnergyImport"
        value: "1-1:3.8.0"
      ReactiveEnergyExport:
        summary: "ReactiveEnergyExport"
        value: "1-1:4.8.0"
      ActivePowerImport:
        summary: "ActivePowerImport"
        value: "1-1:1.7.0"
      TariffHT:
        summary: "TariffHT"
        value: "1-1:1.8.1"
      TariffNT:
        summary: "TariffNT"
        value: "1-1:1.8.2"
  description:
    type: string
    maxLength: 500
    nullable: true
    description: |
      Human-readable description of the measured quantity.
      **German:** Lesbare Beschreibung der gemessenen Größe.
    x-i18n:
      de:
        description: Lesbare Beschreibung der gemessenen Größe.
    examples:
      ActiveImportTotal:
        summary: "ActiveImportTotal"
        value: "Active energy import, tariff total"
      ActiveExportTotal:
        summary: "ActiveExportTotal"
        value: "Active energy export, tariff total"
      TariffHT:
        summary: "TariffHT"
        value: "Active energy import, high tariff (HT)"
  label:
    $ref: "../common/multilingualLabel.yaml"
