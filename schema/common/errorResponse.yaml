type: object
title: ErrorResponse
description: |
  Standardized error response returned when an API request fails.
  **German:** Standardisierte Fehlerantwort bei fehlgeschlagenen API-Anfragen.
x-i18n:
  de:
    title: Fehlerantwort
    description: Standardisierte Fehlerantwort bei fehlgeschlagenen API-Anfragen.
required:
  - code
  - message
properties:
  code:
    type: string
    description: |
      Machine-readable error code.
      **German:** Maschinenlesbarer Fehlercode.
    x-i18n:
      de:
        description: Maschinenlesbarer Fehlercode.
    examples:
      NotFound:
        summary: "NotFound"
        value: "MALO_NOT_FOUND"
      Invalid:
        summary: "Invalid"
        value: "MALO_ID_INVALID"
      Unauthorized:
        summary: "Unauthorized"
        value: "UNAUTHORIZED"
      Conflict:
        summary: "Conflict"
        value: "DUPLICATE_TRANSACTION"
  message:
    type: string
    description: |
      Human-readable error message in English.
      **German:** Lesbare Fehlermeldung auf Englisch.
    x-i18n:
      de:
        description: Lesbare Fehlermeldung auf Englisch.
    examples:
      NotFound:
        summary: "NotFound"
        value: "Market location not found"
      Invalid:
        summary: "Invalid"
        value: "Market location ID must be 11 digits"
      Unauthorized:
        summary: "Unauthorized"
        value: "Bearer token missing or invalid"
  messageLocalized:
    $ref: "../common/multilingualLabel.yaml"
  details:
    type: array
    items:
      type: string
    description: |
      Additional error detail messages.
      **German:** Zusätzliche Fehlerdetails.
    x-i18n:
      de:
        description: Zusätzliche Fehlerdetails.
  timestamp:
    type: string
    format: date-time
    description: |
      Timestamp when the error occurred (ISO 8601).
      **German:** Zeitstempel des Auftretens (ISO 8601).
    x-i18n:
      de:
        description: Zeitstempel des Fehlerauftretens (ISO 8601).
