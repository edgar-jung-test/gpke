type: object
title: ErrorResponse
description: |
  Standardized error response returned when an API request fails.
  **German:** Standardisierte Fehlerantwort bei fehlgeschlagenen API-Anfragen.
x-i18n:
  de:
    title: Fehlerantwort
    description: Standardisierte Fehlerantwort bei fehlgeschlagenen API-Anfragen.
required:
  - code
  - message
properties:
  code:
    type: string
    description: |
      Machine-readable error code.
      **German:** Maschinenlesbarer Fehlercode.
    x-i18n:
      de:
        description: Maschinenlesbarer Fehlercode.
    example: "MALO_NOT_FOUND"
  message:
    type: string
    description: |
      Human-readable error message in English.
      **German:** Lesbare Fehlermeldung auf Englisch.
    x-i18n:
      de:
        description: Lesbare Fehlermeldung auf Englisch.
    example: "Market location not found"
  messageLocalized:
    $ref: "../common/multilingual-label.yaml"
  details:
    type: array
    items:
      type: string
    description: |
      Additional error detail messages.
      **German:** Zusätzliche Fehlerdetails.
    x-i18n:
      de:
        description: Zusätzliche Fehlerdetails.
  timestamp:
    type: string
    format: date-time
    description: |
      Timestamp when the error occurred (ISO 8601).
      **German:** Zeitstempel des Auftretens (ISO 8601).
    x-i18n:
      de:
        description: Zeitstempel des Fehlerauftretens (ISO 8601).
