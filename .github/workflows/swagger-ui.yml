name: Build Swagger UI

# ── Trigger ────────────────────────────────────────────────────────────────
on:
  push:
    branches:
      - main
    paths:
      # Re-build whenever any API/schema/header file changes
      - 'api/**'
      - 'schema/**'
      - 'header/**'
      - 'index.yaml'
      - '.github/workflows/swagger-ui.yml'
  workflow_dispatch:   # allow manual trigger from Actions tab

# ── Permissions ────────────────────────────────────────────────────────────
permissions:
  contents: write      # needed to push the /ui output back to the repo

jobs:
  build-swagger-ui:
    name: Bundle → Swagger UI → commit /ui
    runs-on: ubuntu-latest

    steps:

      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0          # full history so we can push back

      # ── 2. Node.js (for Redocly CLI) ─────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          # no 'cache' here – repo has no package-lock.json / yarn.lock

      # ── 3. Install Redocly CLI ────────────────────────────────────────────
      - name: Install Redocly CLI
        run: npm install -g @redocly/cli@latest

      # ── 4. Lint (fail fast on broken $refs) ──────────────────────────────
      - name: Lint API spec
        run: |
          redocly lint api/malo.yaml \
            --skip-rule=operation-operationId-unique \
            || true
          # '|| true' keeps the build going; remove if you want lint to be a hard gate

      # ── 5. Bundle: resolve all $ref chains into a single file ─────────────
      # Swagger UI cannot load multi-file specs with relative $refs served
      # from a static host, so we bundle everything into one self-contained YAML.
      - name: Bundle API spec (resolve all $refs)
        run: |
          mkdir -p ui
          redocly bundle api/malo.yaml \
            --output ui/openapi-bundled.yaml \
            --dereferenced=false

      # ── 6. Download Swagger UI dist ───────────────────────────────────────
      # Install via npm (avoids fragile tar --strip-components path issues).
      # To update: change SWAGGER_UI_VERSION below.
      - name: Download Swagger UI
        env:
          SWAGGER_UI_VERSION: '5.17.14'
        run: |
          npm install --prefix /tmp/swagger-ui-dist \
            swagger-ui-dist@${SWAGGER_UI_VERSION}
          SRC=/tmp/swagger-ui-dist/node_modules/swagger-ui-dist
          cp ${SRC}/*.js   ui/
          cp ${SRC}/*.css  ui/
          cp ${SRC}/*.png  ui/ 2>/dev/null || true
          cp ${SRC}/swagger-initializer.js ui/

      # ── 7. Write swagger-initializer.js ─────────────────────────────────
      # Overwrite completely – avoids heredoc indentation issues and
      # the double window.onload conflict in the shipped initializer.
      - name: Configure Swagger UI initializer
        run: |
          printf '%s\n' \
            'window.onload = function() {' \
            '  window.ui = SwaggerUIBundle({' \
            '    url: "./openapi-bundled.yaml",' \
            '    dom_id: "#swagger-ui",' \
            '    presets: [SwaggerUIBundle.presets.apis, SwaggerUIStandalonePreset],' \
            '    layout: "StandaloneLayout",' \
            '    docExpansion: "list",' \
            '    deepLinking: true,' \
            '    displayRequestDuration: true,' \
            '    filter: true,' \
            '    showExtensions: true,' \
            '    showCommonExtensions: true' \
            '  });' \
            '};' \
            > ui/swagger-initializer.js

      # ── 8. Write index.html ───────────────────────────────────────────────
      - name: Write custom index.html
        run: |
          printf '%s\n' \
            '<!DOCTYPE html>' \
            '<html lang="de">' \
            '<head>' \
            '  <meta charset="UTF-8"/>' \
            '  <meta name="viewport" content="width=device-width, initial-scale=1"/>' \
            '  <title>GPKE / UTILMD - API-Dokumentation</title>' \
            '  <link rel="stylesheet" href="./swagger-ui.css"/>' \
            '  <link rel="icon" type="image/png" href="./favicon-32x32.png" sizes="32x32"/>' \
            '</head>' \
            '<body>' \
            '  <div id="swagger-ui"></div>' \
            '  <script src="./swagger-ui-bundle.js"></script>' \
            '  <script src="./swagger-ui-standalone-preset.js"></script>' \
            '  <script src="./swagger-initializer.js"></script>' \
            '</body>' \
            '</html>' \
            > ui/index.html

      # ── 9. Write .nojekyll (required for GitHub Pages) ───────────────────
      - name: Add .nojekyll
        run: touch ui/.nojekyll

      # ── 10. Copy README into ui/ ─────────────────────────────────────────
      # The README is committed in the repo at ui/README.md.
      # If it exists, it survives in gh-pages; nothing to do here.
      # We just ensure .nojekyll is present (done in step 9).

      # ── 11. Deploy to GitHub Pages (gh-pages branch) ─────────────────────
      # Pushes the contents of ui/ to the root of the gh-pages branch.
      # GitHub Pages settings: Branch = gh-pages, Folder = / (root)
      #
      # The gh-pages branch is created automatically on first run.
      # It contains ONLY the Swagger UI files – no source code.
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir:   ./ui          # push contents of ui/ (not ui/ itself)
          publish_branch: gh-pages     # target branch – created if missing
          destination_dir: .           # place files at branch root
          commit_message: |
            chore(pages): rebuild Swagger UI from ${{ github.sha }}
