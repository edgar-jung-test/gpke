openapi: "3.0.3"
info:
  title: GPKE / UTILMD OpenAPI Repository
  version: "2.1.0"
  description: |
    Repository-level entry point aggregating the GPKE / UTILMD OpenAPI ecosystem.

    This file registers all top-level API specifications and the shared schema
    library so that tooling (Redocly, Spectral, Swagger Editor, etc.) can resolve
    the full dependency graph from a single entry point.

    **Included APIs:**
    - `api/malo.yaml` – GPKE Lieferbeginn (supply start / supplier change)

    **Security:**
    All endpoints require HTTP Message Signatures (RFC 9421) and JWS/JWE payload security.
    See `docs/security/` for full documentation.
    Alle Endpunkte erfordern HTTP-Message-Signaturen (RFC 9421) und JWS/JWE-Payload-Sicherheit.
    Vollständige Dokumentation unter `docs/security/`.

    **Shared libraries:**
    - `schema/openapi.yaml` – BDEW UTILMD schema library (all domain schemas)
    - `header/openapi.yaml` – EDI@Energy reusable HTTP header definitions

    **German:** Repository-Einstiegspunkt, der alle API-Spezifikationen und die
    gemeinsame Schema-Bibliothek des GPKE/UTILMD-Ökosystems aggregiert.

    Enthaltene APIs:
    - `api/malo.yaml` – GPKE Lieferbeginn (Lieferantenwechsel)

    Gemeinsame Bibliotheken:
    - `schema/openapi.yaml` – BDEW UTILMD Schema-Bibliothek
    - `header/openapi.yaml` – EDI@Energy HTTP-Header-Definitionen
  contact:
    name: BDEW
    url: https://www.bdew-mako.de
  license:
    name: BDEW
    url: https://www.bdew-mako.de

# ── Servers ───────────────────────────────────────────────────────────────────
servers:
  - url: https://api.example.com
    description: Production server / Produktionsserver

# ── Tags (all APIs combined) ──────────────────────────────────────────────────
tags:
  # GPKE Lieferbeginn
  - name: registrations
    description: >
      Registration requests: new supplier (LFN) → grid operator (NB).
      Steps 1, 2, 5. / Anmeldungen: LFN → NB. Schritte 1, 2, 5.
  - name: deregistrationRequests
    description: >
      Deregistration requests between NB and previous supplier (LFA).
      Steps 3, 4. / Abmeldeanfragen NB ↔ LFA. Schritte 3, 4.
  - name: assignments
    description: >
      Assignment termination and cancellation notifications. Steps 6, 7. /
      Zuordnungsbeendigungen und -aufhebungen. Schritte 6, 7.
  # UTILMD
  - name: marketActors
    description: Market participants and their roles / Marktakteure und Rollen
  - name: marketLocations
    description: Market locations (MaLo) / Marktlokationen
  - name: gridLocations
    description: Grid locations (NeLo) / Netzlokationen
  - name: meteringLocations
    description: Metering locations (MeLo) / Messlokationen
  - name: meteringDevices
    description: Metering devices / Messeinrichtungen
  - name: locationBundles
    description: Location bundle structures / Lokationsbündelstrukturen
  - name: messages
    description: UTILMD messages / UTILMD-Nachrichten
  - name: balancing
    description: Balancing areas and zones / Bilanzierungsgebiete und -kreise
  - name: security
    description: >
      API security — HTTP Message Signatures (RFC 9421), JWS (RFC 7515), JWE (RFC 7516).
      See docs/security/ for full documentation. /
      API-Sicherheit — HTTP-Message-Signaturen, JWS, JWE. Siehe docs/security/.

# ── Paths – delegated to individual API files ──────────────────────────────────
#
# Each API spec owns its own paths. This index aggregates them by $ref so that
# bundling tools can resolve everything from a single entry point.
#
paths:

  # GPKE Lieferbeginn ──────────────────────────────────────────────────────────
  /malo/{marketLocationId}/registrations:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1registrations"

  /malo/{marketLocationId}/registrations/{supplyStartId}:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1registrations~1{supplyStartId}"

  /malo/{marketLocationId}/registrations/{supplyStartId}/response:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1registrations~1{supplyStartId}~1response"

  /malo/{marketLocationId}/deregistration-requests:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1deregistration-requests"

  /malo/{marketLocationId}/deregistration-requests/{deregistrationRequestId}/response:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1deregistration-requests~1{deregistrationRequestId}~1response"

  /malo/{marketLocationId}/assignment-terminations:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1assignment-terminations"

  /malo/{marketLocationId}/assignment-cancellations:
    $ref: "./api/malo.yaml#/paths/~1malo~1{marketLocationId}~1assignment-cancellations"

# ── Components – aggregated from schema library ───────────────────────────────
components:
  schemas:

    # ── Common ─────────────────────────────────────────────────────────────
    multilingualLabel:
      $ref: "./schema/common/multilingualLabel.yaml"
    validityPeriod:
      $ref: "./schema/common/validityPeriod.yaml"
    address:
      $ref: "./schema/common/address.yaml"
    obisCode:
      $ref: "./schema/common/obisCode.yaml"
    voltageLevel:
      $ref: "./schema/common/voltageLevel.yaml"
    product:
      $ref: "./schema/common/product.yaml"
    errorResponse:
      $ref: "./schema/common/errorResponse.yaml"
    pagedResponse:
      $ref: "./schema/common/pagedResponse.yaml"

    # ── Enumerations – UTILMD / general ────────────────────────────────────
    marketRoleCode:
      $ref: "./schema/enumerations/marketRoleCode.yaml"
    transactionReason:
      $ref: "./schema/enumerations/transactionReason.yaml"
    meteringPointType:
      $ref: "./schema/enumerations/meteringPointType.yaml"
    meterOperatorType:
      $ref: "./schema/enumerations/meterOperatorType.yaml"
    energyDirection:
      $ref: "./schema/enumerations/energyDirection.yaml"
    locationBundleType:
      $ref: "./schema/enumerations/locationBundleType.yaml"
    profileType:
      $ref: "./schema/enumerations/profileType.yaml"
    messageType:
      $ref: "./schema/enumerations/messageType.yaml"

    # ── Enumerations – GPKE Lieferbeginn ───────────────────────────────────
    supplyStartStatus:
      $ref: "./schema/enumerations/supplyStartStatus.yaml"
    identificationMode:
      $ref: "./schema/enumerations/identificationMode.yaml"
    meterReadingCycle:
      $ref: "./schema/enumerations/meterReadingCycle.yaml"
    terminationReason:
      $ref: "./schema/enumerations/terminationReason.yaml"
    deregistrationCase:
      $ref: "./schema/enumerations/deregistrationCase.yaml"

    # ── Market Actors ───────────────────────────────────────────────────────
    marketActor:
      $ref: "./schema/marketActors/marketActor.yaml"
    marketActorRole:
      $ref: "./schema/marketActors/marketActorRole.yaml"
    marketActorId:
      $ref: "./schema/marketActors/marketActorId.yaml"
    communicationContact:
      $ref: "./schema/marketActors/communicationContact.yaml"

    # ── Locations – Market Location ─────────────────────────────────────────
    marketLocationId:
      $ref: "./schema/locations/marketLocation/marketLocationId.yaml"
    marketLocation:
      $ref: "./schema/locations/marketLocation/marketLocation.yaml"
    marketLocationStatus:
      $ref: "./schema/locations/marketLocation/marketLocationStatus.yaml"
    marketLocationProfile:
      $ref: "./schema/locations/marketLocation/marketLocationProfile.yaml"
    dormantMarketLocation:
      $ref: "./schema/locations/marketLocation/dormantMarketLocation.yaml"

    # ── Locations – Grid Location ───────────────────────────────────────────
    gridLocationId:
      $ref: "./schema/locations/gridLocation/gridLocationId.yaml"
    gridLocation:
      $ref: "./schema/locations/gridLocation/gridLocation.yaml"

    # ── Locations – Metering Location ──────────────────────────────────────
    meteringLocationId:
      $ref: "./schema/locations/meteringLocation/meteringLocationId.yaml"
    meteringLocation:
      $ref: "./schema/locations/meteringLocation/meteringLocation.yaml"

    # ── Locations – Tranche ─────────────────────────────────────────────────
    trancheId:
      $ref: "./schema/locations/tranche/trancheId.yaml"
    tranche:
      $ref: "./schema/locations/tranche/tranche.yaml"

    # ── Metering Devices ────────────────────────────────────────────────────
    meterNumber:
      $ref: "./schema/metering/devices/meterNumber.yaml"
    meter:
      $ref: "./schema/metering/devices/meter.yaml"
    gateway:
      $ref: "./schema/metering/devices/gateway.yaml"
    technicalResource:
      $ref: "./schema/metering/devices/technicalResource.yaml"
    controllableResource:
      $ref: "./schema/metering/devices/controllableResource.yaml"
    controlDevice:
      $ref: "./schema/metering/devices/controlDevice.yaml"
    controlBox:
      $ref: "./schema/metering/devices/controlBox.yaml"
    volumeConverter:
      $ref: "./schema/metering/devices/volumeConverter.yaml"
    communicationDevice:
      $ref: "./schema/metering/devices/communicationDevice.yaml"
    transformerDevice:
      $ref: "./schema/metering/devices/transformerDevice.yaml"
    tariffDevice:
      $ref: "./schema/metering/devices/tariffDevice.yaml"

    # ── Metering Registers ──────────────────────────────────────────────────
    meterRegister:
      $ref: "./schema/metering/registers/meterRegister.yaml"
    gatewayRegister:
      $ref: "./schema/metering/registers/gatewayRegister.yaml"

    # ── Balancing ───────────────────────────────────────────────────────────
    controlArea:
      $ref: "./schema/balancing/controlArea.yaml"
    balancingArea:
      $ref: "./schema/balancing/balancingArea.yaml"
    balancingGroup:
      $ref: "./schema/balancing/balancingGroup.yaml"
    marketArea:
      $ref: "./schema/balancing/marketArea.yaml"
    gridAccount:
      $ref: "./schema/balancing/gridAccount.yaml"

    # ── Message ─────────────────────────────────────────────────────────────
    messageHeader:
      $ref: "./schema/message/messageHeader.yaml"
    messageSender:
      $ref: "./schema/message/messageSender.yaml"
    messageRecipient:
      $ref: "./schema/message/messageRecipient.yaml"
    messageTransaction:
      $ref: "./schema/message/messageTransaction.yaml"
    transactionStatus:
      $ref: "./schema/message/transactionStatus.yaml"
    usagePeriod:
      $ref: "./schema/message/usagePeriod.yaml"
    checkIdentifier:
      $ref: "./schema/message/checkIdentifier.yaml"

    # ── Supply Start / GPKE Lieferbeginn ────────────────────────────────────
    balancingAssignment:
      $ref: "./schema/supplyStart/balancingAssignment.yaml"
    marketLocationIdentification:
      $ref: "./schema/supplyStart/marketLocationIdentification.yaml"
    masterDataResponse:
      $ref: "./schema/supplyStart/masterDataResponse.yaml"
    rejectionReason:
      $ref: "./schema/supplyStart/rejectionReason.yaml"
    supplyStart:
      $ref: "./schema/supplyStart/supplyStart.yaml"
    supplyStartList:
      $ref: "./schema/supplyStart/supplyStartList.yaml"

    # ── Composed Objects ────────────────────────────────────────────────────
    locationBundle:
      $ref: "./schema/composed/locationBundle.yaml"
    utilmdMessage:
      $ref: "./schema/composed/utilmdMessage.yaml"
    marketLocationFull:
      $ref: "./schema/composed/marketLocationFull.yaml"
    gridLocationFull:
      $ref: "./schema/composed/gridLocationFull.yaml"
    meteringLocationFull:
      $ref: "./schema/composed/meteringLocationFull.yaml"
    meterFull:
      $ref: "./schema/composed/meterFull.yaml"
    marketActorFull:
      $ref: "./schema/composed/marketActorFull.yaml"

  # ── Parameters ──────────────────────────────────────────────────────────────
  parameters:
    # Path parameters
    marketLocationId:
      $ref: "./api/malo.yaml#/components/parameters/marketLocationId"
    supplyStartId:
      $ref: "./api/malo.yaml#/components/parameters/supplyStartId"
    deregistrationRequestId:
      $ref: "./api/malo.yaml#/components/parameters/deregistrationRequestId"
    # Security / signature request headers (RFC 9421 + RFC 9530)
    contentDigest:
      $ref: "./header/headers/contentDigest.yaml"
    signatureInput:
      $ref: "./header/headers/signatureInput.yaml"
    signature:
      $ref: "./header/headers/signature.yaml"
    # General request headers
    xRequestId:
      $ref: "./header/headers/xRequestId.yaml"
    xMessageId:
      $ref: "./header/headers/xMessageId.yaml"
    idempotencyKey:
      $ref: "./header/headers/idempotencyKey.yaml"
    traceparent:
      $ref: "./header/headers/traceparent.yaml"
    prefer:
      $ref: "./header/headers/prefer.yaml"
    xClientVersion:
      $ref: "./header/headers/xClientVersion.yaml"
    # State-machine request header
    ifMatch:
      $ref: "./header/headers/ifMatch.yaml"

  # ── Headers (Response headers) ───────────────────────────────────────────────
  headers:
    location:
      $ref: "./header/openapi.yaml#/components/headers/location"
    xMessageId:
      $ref: "./header/openapi.yaml#/components/headers/xMessageId"
    eTag:
      $ref: "./header/openapi.yaml#/components/headers/eTag"
    preferenceApplied:
      $ref: "./header/openapi.yaml#/components/headers/preferenceApplied"
    retryAfter:
      $ref: "./header/openapi.yaml#/components/headers/retryAfter"
    xServerVersion:
      $ref: "./header/openapi.yaml#/components/headers/xServerVersion"
    xApiSpecVersion:
      $ref: "./header/openapi.yaml#/components/headers/xApiSpecVersion"
    xApiSpecRef:
      $ref: "./header/openapi.yaml#/components/headers/xApiSpecRef"
    xApiSpecId:
      $ref: "./header/openapi.yaml#/components/headers/xApiSpecId"
    xBackendVersion:
      $ref: "./header/openapi.yaml#/components/headers/xBackendVersion"

  # ── Security ─────────────────────────────────────────────────────────────────
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    httpMessageSignature:
      type: apiKey
      in: header
      name: Signature
      description: >
        HTTP Message Signature per RFC 9421.
        Must be accompanied by Signature-Input header.
        POST/PATCH also require Content-Digest (RFC 9530).

security:
  - bearerAuth: []
    httpMessageSignature: []
