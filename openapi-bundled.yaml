openapi: 3.0.3
info:
  title: GPKE Supply Start (Lieferbeginn) REST API
  version: 1.0.0
  description: |
    **The APIs are intended solely as a framework. 
    The proposed APIs must be validated against the processes and adapted accordingly.
    This interface must not be used in this version.**

    **Bei den API's handelt es sich ausschließlich um einen Rahmen. 
    Die vorgeschlagenen API'S müssen gegen die Prozesse validiert und entsprechend angepasst werden.
    Diese Schnittstelle darf in dieser Version nicht verwendet werden.**

    Content / Inhaltlich

    REST API for the GPKE use-case "Lieferbeginn" (supply start / supplier change), 
    covering all 7 process steps of SD: Lieferbeginn (GPKE Teil 2, p. 31 ff.). 
    Business data corresponds to EDIFACT UTILMD messages exchanged between market participants.

    **German:** REST API für den GPKE-Use-Case „Lieferbeginn" (Lieferantenwechsel).
     Deckt alle 7 Prozessschritte des SD: Lieferbeginn (GPKE Teil 2, S. 31 ff.) ab.
      Die Geschäftsdaten entsprechen den EDIFACT-UTILMD-Nachrichten der Marktkommunikation.
  contact:
    name: Edgar Jung
    url: https://www.bdew-mako.de
    email: edgar.jung.external@westnetz.de
  license:
    name: BDEW
    url: https://www.bdew-mako.de
servers:
  - url: https://api.makohub.com
    description: Production server / Produktionsserver
security:
  - bearerAuth: []
tags:
  - name: assignments
    description: |
      Assignment termination and cancellation notifications. Steps 6, 7. Prüf-IDs 55037, 55038. **German:** Zuordnungsbeendigungen und -aufhebungen. Schritte 6, 7.
  - name: deregistrationRequests
    description: |
      Deregistration requests between NB and previous supplier (LFA). Steps 3, 4. Prüf-IDs 55010, 55011, 55012. **German:** Abmeldeanfragen zwischen Netzbetreiber (NB) und altem Lieferanten (LFA). Schritte 3, 4.
  - name: registrations
    description: |
      Registration requests: new supplier (LFN) → grid operator (NB). Steps 1, 2, 5. Prüf-IDs 55001, 55077, 55002, 55003, 55078, 55080. **German:** Anmeldungen: neuer Lieferant (LFN) → Netzbetreiber (NB). Schritte 1, 2, 5.
paths:
  /malo/{marketLocationId}/registrations:
    post:
      summary: Submit a registration request (Anmeldung) – Prüf-ID 55001 / 55077
      description: |
        **Step 1 – Registration (Anmeldung).** The new supplier (LFN) registers a market location with the grid operator (NB).
        Lead times (working days before supply start): 
        - Case 1 (MaLo-ID only): ≥ 7 WT. 
        - Case 2 (address / attributes): ≥ 10 WT.
        **German:** **Schritt 1 – Anmeldung.** 
        Der neue Lieferant (LFN) meldet eine Marktlokation beim Netzbetreiber (NB) an. Vorlauffristen: 
        - Fall 1 (nur MaLo-ID) ≥ 7 WT, 
        - Fall 2 (Adresse / Attribute) ≥ 10 WT.
      operationId: createRegistration
      tags:
        - registrations
      parameters:
        - $ref: '#/components/parameters/marketLocationId'
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/idempotencyKey'
        - $ref: '#/components/parameters/xMessageId'
        - $ref: '#/components/parameters/contentDigest'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
        - $ref: '#/components/parameters/xApiSpecRef'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplyStartCreateRequest'
            examples:
              supplierChangeFall1:
                summary: |
                  Supplier change – case 1, MaLo-ID only (Prüf-ID 55001) / Lieferantenwechsel – Fall 1, nur MaLo-ID
                value:
                  header:
                    messageId: MSG-2025-001234
                    messageType: E01
                    checkIdentifier:
                      value: '55001'
                      communicationDirection: LF→NB
                    createdAt: '2025-03-15T08:00:00Z'
                    sender:
                      actorId:
                        id: '9900987654321'
                        codingScheme: '293'
                      marketRole: LF
                    recipient:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                  supplyStartDate: '2025-04-01'
                  transactionReason: ZA1
                  isHouseholdCustomer: true
                  marketLocationIdentification:
                    identificationMode: maloIdOnly
                    maLoId: '51238696781'
                  energyDirection: CONSUMPTION
                  balancing:
                    balancingGroupId: 11XVSEW------5S
                    authorizationReference: ZE-2025-00042
              newConnectionFall2:
                summary: |
                  New connection – case 2, address (Prüf-ID 55001) / Neuanlage – Fall 2, Adresse
                value:
                  header:
                    messageId: MSG-2025-001235
                    messageType: E01
                    checkIdentifier:
                      value: '55001'
                      communicationDirection: LF→NB
                    createdAt: '2025-03-15T09:15:00Z'
                    sender:
                      actorId:
                        id: '9900987654321'
                        codingScheme: '293'
                      marketRole: LF
                    recipient:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                  supplyStartDate: '2025-05-01'
                  requestedStartDateForNewConnection: '2025-05-01'
                  transactionReason: ZA2
                  isHouseholdCustomer: false
                  marketLocationIdentification:
                    identificationMode: multiAttribute
                    address:
                      street: Industriestraße 14b
                      city: Berlin
                      postalCode: '10115'
                      countryCode: DE
                  energyDirection: CONSUMPTION
                  balancing:
                    balancingGroupId: 11XVSEW------5S
                  meterReadingCycle: monthly
      responses:
        '201':
          description: |
            Registration created successfully. Returns the created SupplyStart resource. **German:** Anmeldung erfolgreich erstellt. Gibt die erstellte Ressource zurück.
          headers:
            Location:
              $ref: '#/components/headers/location'
            X-Message-ID:
              $ref: '#/components/headers/xMessageId'
            ETag:
              $ref: '#/components/headers/eTag'
            X-API-Spec-Ref:
              $ref: '#/components/headers/xApiSpecRef'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/supplyStart'
        '400':
          description: |
            Validation error – e.g. invalid date format, lead time not met, missing required field. **German:** Validierungsfehler – z.B. ungültiges Datum, Vorlaufzeit nicht eingehalten, fehlendes Pflichtfeld.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '409':
          description: |
            Conflict – another registration is already in progress for this market location. **German:** Konflikt – für diese Marktlokation läuft bereits eine Anmeldung.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
      x-stoplight:
        id: 21ehkz24esbpm
    get:
      summary: List registration requests / Anmeldungen auflisten
      operationId: listRegistrations
      tags:
        - registrations
      parameters:
        - $ref: '#/components/parameters/marketLocationId'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
        - name: status
          in: query
          schema:
            $ref: '#/components/schemas/supplyStartStatus'
          description: |
            Filter by processing status. **German:** Filter nach Bearbeitungsstatus.
        - name: fromDate
          in: query
          schema:
            type: string
            format: date
          description: |
            Filter: supply start date ≥ this value (ISO 8601). **German:** Filter: Lieferbeginn-Datum ≥ diesem Wert (ISO 8601).
        - name: toDate
          in: query
          schema:
            type: string
            format: date
          description: |
            Filter: supply start date ≤ this value (ISO 8601). **German:** Filter: Lieferbeginn-Datum ≤ diesem Wert (ISO 8601).
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 500
            default: 50
          description: |
            Page size (number of results per page). **German:** Seitengröße (Anzahl Ergebnisse pro Seite).
        - name: offset
          in: query
          schema:
            type: integer
            minimum: 0
            default: 0
          description: |
            Page offset (zero-based). **German:** Seitenoffset (nullbasiert).
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/supplyStartList'
      x-stoplight:
        id: ny6yjclg4t0aq
  /malo/{marketLocationId}/registrations/{supplyStartId}:
    parameters:
      - name: marketLocationId
        in: path
        required: true
        description: |
          Unique 11-digit market location ID (MaLo-ID). Corresponds to EDIFACT SG5 LOC DE3225, qualifier Z16. **German:** Eindeutige 11-stellige Marktlokations-ID (MaLo-ID). EDIFACT SG5 LOC DE3225, Qualifier Z16.
        schema:
          $ref: '#/components/schemas/marketLocationId'
      - name: supplyStartId
        in: path
        required: true
        description: |
          Unique registration (supply start) request ID. **German:** Eindeutige Anmeldungs-ID (Lieferbeginn-Anfrage).
        schema:
          type: string
          maxLength: 35
          example: SS-2025-00042
    get:
      summary: Get a registration request / Anmeldung abrufen
      description: |
        Returns the full current state of a registration, including any NB response data (step 5 confirmation / rejection) and existing-assignment information (step 2). **German:** Gibt den vollständigen aktuellen Stand einer Anmeldung zurück, einschließlich der NB-Antwort (Schritt 5) und Informationen zur bestehenden Zuordnung (Schritt 2).
      operationId: getRegistration
      tags:
        - registrations
      parameters:
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
      responses:
        '200':
          description: OK
          headers:
            ETag:
              $ref: '#/components/headers/eTag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/supplyStart'
        '404':
          description: |
            Registration not found. **German:** Anmeldung nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
      x-stoplight:
        id: zxh2ziba377kh
    patch:
      summary: Update mutable fields of a registration / Anmeldung teilweise aktualisieren
      description: |
        Updates changeable fields of a registration while it is still in status `draft`. Once submitted to the NB the registration is immutable. **German:** Aktualisiert änderbare Felder einer Anmeldung, solange diese den Status `draft` hat. Nach Einreichung beim NB ist die Anmeldung unveränderlich.
      operationId: patchRegistration
      tags:
        - registrations
      parameters:
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/idempotencyKey'
        - $ref: '#/components/parameters/ifMatch'
        - $ref: '#/components/parameters/contentDigest'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SupplyStartPatchRequest'
      responses:
        '200':
          description: |
            Updated successfully. **German:** Erfolgreich aktualisiert.
          headers:
            ETag:
              $ref: '#/components/headers/eTag'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/supplyStart'
        '400':
          description: Validation error / Validierungsfehler.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '404':
          description: Not found / Nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '409':
          description: |
            Conflict – registration cannot be modified in current status (not draft). **German:** Konflikt – Anmeldung kann im aktuellen Status nicht geändert werden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '412':
          description: |
            Precondition failed – ETag mismatch (state has changed since last read). **German:** Precondition Failed – ETag stimmt nicht überein (Zustand hat sich geändert).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
      x-stoplight:
        id: hr70cbq47wy9l
  /malo/{marketLocationId}/registrations/{supplyStartId}/response:
    post:
      summary: NB responds to a registration – Prüf-ID 55002 / 55003 / 55078 / 55080
      description: |
        **Step 5 – Response (Antwort auf Anmeldung).** The grid operator (NB) confirms or rejects the supplier's registration.
        Deadlines (working days from receipt of registration): Case 1: by end of 5th WT. Case 2: by end of 8th WT.
        **German:** **Schritt 5 – Antwort auf Anmeldung.** Der Netzbetreiber (NB) bestätigt oder lehnt die Anmeldung ab.
        Fristen ab Eingang der Anmeldung: Fall 1 bis Ende des 5. WT, Fall 2 bis Ende des 8. WT.
      operationId: respondToRegistration
      tags:
        - registrations
      parameters:
        - $ref: '#/components/parameters/marketLocationId'
        - $ref: '#/components/parameters/supplyStartId'
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/xMessageId'
        - $ref: '#/components/parameters/idempotencyKey'
        - $ref: '#/components/parameters/contentDigest'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegistrationResponseRequest'
            examples:
              confirmation:
                summary: |
                  NB confirms registration (Prüf-ID 55002) / NB bestätigt Anmeldung
                value:
                  header:
                    messageId: MSG-2025-001300
                    messageType: E04
                    checkIdentifier:
                      value: '55002'
                      communicationDirection: NB→LF
                    createdAt: '2025-03-18T09:00:00Z'
                    sender:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                    recipient:
                      actorId:
                        id: '9900987654321'
                        codingScheme: '293'
                      marketRole: LF
                  status:
                    statusCode: E01
                  effectiveSupplyStartDate: '2025-04-01'
                  previousSupplierEndDate: '2025-03-31'
                  masterData:
                    voltageLevel:
                      code: E06
                      name: Low voltage (Niederspannung NS)
                    currentMeteringPointOperatorId:
                      id: '9901234567890'
                      codingScheme: '293'
                    supplyContractId: NNV-2024-00123
                    isInterruptible: false
              rejection:
                summary: |
                  NB rejects registration (Prüf-ID 55003) / NB lehnt Anmeldung ab
                value:
                  header:
                    messageId: MSG-2025-001301
                    messageType: E05
                    checkIdentifier:
                      value: '55003'
                      communicationDirection: NB→LF
                    createdAt: '2025-03-18T09:30:00Z'
                    sender:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                    recipient:
                      actorId:
                        id: '9900987654321'
                        codingScheme: '293'
                      marketRole: LF
                  status:
                    statusCode: E03
                    rejectionCode: E_0610
                  rejectionReasons:
                    - code: E_0610
                      message: Previous supplier objected to deregistration within deadline
      responses:
        '200':
          description: |
            Response processed, registration updated. **German:** Antwort verarbeitet, Anmeldung aktualisiert.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/supplyStart'
        '400':
          description: Validation error / Validierungsfehler.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '404':
          description: Registration not found / Anmeldung nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '409':
          description: |
            Conflict – registration already responded to. **German:** Konflikt – Anmeldung wurde bereits beantwortet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
      x-stoplight:
        id: 9by8890htxu5w
    parameters:
      - schema:
          type: string
        name: marketLocationId
        in: path
        required: true
      - schema:
          type: string
        name: supplyStartId
        in: path
        required: true
  /malo/{marketLocationId}/deregistration-requests:
    post:
      summary: NB sends deregistration request to LFA – Prüf-ID 55010
      description: |
        **Step 3 – Deregistration request (Abmeldeanfrage).** Grid operator notifies previous supplier of new registration and asks whether deregistration will be confirmed.
        Deadlines from receipt of registration: Case 1: by end of 1st WT. Case 2: by end of 4th WT.
        **German:** **Schritt 3 – Abmeldeanfrage.** Netzbetreiber informiert alten Lieferanten über neue Anmeldung und fragt ob die Abmeldung bestätigt wird.
        Fristen ab Eingang der Anmeldung: Fall 1 bis Ende des 1. WT, Fall 2 bis Ende des 4. WT.
      operationId: createDeregistrationRequest
      tags:
        - deregistrationRequests
      parameters:
        - $ref: '#/components/parameters/marketLocationId'
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/xMessageId'
        - $ref: '#/components/parameters/idempotencyKey'
        - $ref: '#/components/parameters/contentDigest'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeregistrationRequestCreate'
            examples:
              deregRequest:
                summary: |
                  Deregistration request NB → LFA (Prüf-ID 55010) / Abmeldeanfrage NB an LFA
                value:
                  header:
                    messageId: MSG-2025-001240
                    messageType: E01
                    checkIdentifier:
                      value: '55010'
                      communicationDirection: NB→LF
                    createdAt: '2025-03-15T17:00:00Z'
                    sender:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                    recipient:
                      actorId:
                        id: '9900111222333'
                        codingScheme: '293'
                      marketRole: LF
                  supplyStartId: SS-2025-00042
                  newSupplierId:
                    id: '9900987654321'
                    codingScheme: '293'
                  requestedSupplyStartDate: '2025-04-01'
      responses:
        '201':
          description: |
            Deregistration request created. **German:** Abmeldeanfrage erstellt.
          headers:
            Location:
              $ref: '#/components/headers/location'
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeregistrationRequest'
        '400':
          description: Validation error / Validierungsfehler.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '409':
          description: |
            Conflict – deregistration request already exists for this registration. **German:** Konflikt – für diese Anmeldung existiert bereits eine Abmeldeanfrage.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
      x-stoplight:
        id: zvcg8fwbp815s
    parameters:
      - schema:
          type: string
        name: marketLocationId
        in: path
        required: true
  /malo/{marketLocationId}/deregistration-requests/{deregistrationRequestId}/response:
    post:
      summary: LFA responds to deregistration request – Prüf-ID 55011 / 55012
      description: |
        **Step 4 – Response to deregistration request (Beantwortung Abmeldeanfrage).** Previous supplier confirms (case a or b) or objects to deregistration.
        Deadline: by end of 3rd WT after receipt of deregistration request.
        **German:** **Schritt 4 – Beantwortung der Abmeldeanfrage.** Alter Lieferant bestätigt (Fall a oder b) oder widerspricht der Abmeldung.
        Frist: bis Ende des 3. WT nach Eingang der Abmeldeanfrage.
      operationId: respondToDeregistrationRequest
      tags:
        - deregistrationRequests
      parameters:
        - $ref: '#/components/parameters/marketLocationId'
        - $ref: '#/components/parameters/deregistrationRequestId'
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/xMessageId'
        - $ref: '#/components/parameters/idempotencyKey'
        - $ref: '#/components/parameters/contentDigest'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeregistrationResponseRequest'
            examples:
              confirmCaseA:
                summary: |
                  LFA confirms – case a, day before supply start (Prüf-ID 55011) / LFA bestätigt – Fall a, Tag vor Anmeldedatum
                value:
                  header:
                    messageId: MSG-2025-001260
                    messageType: E04
                    checkIdentifier:
                      value: '55011'
                      communicationDirection: LF→NB
                    createdAt: '2025-03-18T08:00:00Z'
                    sender:
                      actorId:
                        id: '9900111222333'
                        codingScheme: '293'
                      marketRole: LF
                    recipient:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                  status:
                    statusCode: E01
                  deregistrationDate: '2025-03-31'
                  deregistrationCase: caseA
              objection:
                summary: |
                  LFA objects to deregistration (Prüf-ID 55012) / LFA widerspricht der Abmeldung
                value:
                  header:
                    messageId: MSG-2025-001261
                    messageType: E05
                    checkIdentifier:
                      value: '55012'
                      communicationDirection: LF→NB
                    createdAt: '2025-03-18T08:30:00Z'
                    sender:
                      actorId:
                        id: '9900111222333'
                        codingScheme: '293'
                      marketRole: LF
                    recipient:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                  status:
                    statusCode: E03
                    rejectionCode: CONTRACT_ACTIVE
                  rejectionReasons:
                    - code: CONTRACT_ACTIVE
                      message: Fixed-term contract runs until 2025-12-31
      responses:
        '200':
          description: Response processed / Antwort verarbeitet.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeregistrationRequest'
        '400':
          description: Validation error / Validierungsfehler.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
        '404':
          description: Deregistration request not found / Abmeldeanfrage nicht gefunden.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/errorResponse'
      x-stoplight:
        id: zibwz7tpzv3ja
    parameters:
      - schema:
          type: string
        name: marketLocationId
        in: path
        required: true
      - schema:
          type: string
        name: deregistrationRequestId
        in: path
        required: true
  /malo/{marketLocationId}/assignment-terminations:
    post:
      summary: NB notifies LFA of assignment termination – Prüf-ID 55037
      description: |
        **Step 6 – Assignment termination (Beendigung der Zuordnung).** Grid operator informs previous supplier that its assignment has been terminated.
        Deadline: same calendar day as step 5 confirmation.
        **German:** **Schritt 6 – Beendigung der Zuordnung.** Netzbetreiber informiert alten Lieferanten über die Beendigung seiner Zuordnung.
        Frist: am selben Kalendertag wie Schritt 5 (Bestätigung).
      operationId: notifyAssignmentTermination
      tags:
        - assignments
      parameters:
        - $ref: '#/components/parameters/marketLocationId'
        - $ref: '#/components/parameters/xRequestId'
        - $ref: '#/components/parameters/xMessageId'
        - $ref: '#/components/parameters/idempotencyKey'
        - $ref: '#/components/parameters/contentDigest'
        - $ref: '#/components/parameters/signatureInput'
        - $ref: '#/components/parameters/signature'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignmentTerminationCreate'
            examples:
              termination:
                summary: |
                  Assignment termination NB → LFA (Prüf-ID 55037) / Zuordnungsbeendigung NB an LFA
                value:
                  header:
                    messageId: MSG-2025-001310
                    messageType: E01
                    checkIdentifier:
                      value: '55037'
                      communicationDirection: NB→LF
                    createdAt: '2025-03-18T10:00:00Z'
                    sender:
                      actorId:
                        id: '9904132000002'
                        codingScheme: '293'
                      marketRole: NB
                    recipient:
                      actorId:
                        id: '9900111222333'
                        codingScheme: '293'
                      marketRole: LF
                  assignmentEndDate: '2025-03-31'
                  terminationReason: supplierChange
                  supplyStartId: SS-2025-00042
                  newSupplierId:
                    id: '9900987654321'
                    codingScheme: '293'
      responses:
        '201':
          description: Notification created / Mitteilung erstellt.
          content:
            application/json:
              schema:
