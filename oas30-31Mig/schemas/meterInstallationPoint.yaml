title: MeterInstallationPoint
description: |
  Meter installation point assignment. A meter must be assigned to exactly
  one of:
  - `meteringLocationId` (Messlokation / MeLo)
  - `gridCouplingPointId` (Netzkopplungspunkt / NKP)

  Having both or neither is invalid (SQL ERM CHECK constraint).

  **UTILMD AHB / ERM Rule:**
  `CK_Zaehler_Ort`: (MeLo IS NOT NULL AND NKP IS NULL)
  OR (MeLo IS NULL AND NKP IS NOT NULL)

  **German:** Zählerinstallationsort. Ein Zähler gehört zu genau einer Messlokation
  ODER einem Netzkopplungspunkt – niemals zu beiden oder keinem.
  SQL ERM Constraint: CK_Zaehler_Ort.

x-i18n:
  de:
    title: Zählerinstallationsort (bedingt)
    description: |
      Bedingtes Schema: Zähler gehört zu Messlokation XOR Netzkopplungspunkt.
      Beides oder keines ist ungültig (ERM CK_Zaehler_Ort).

type: object
required:
  - deviceNumber

properties:
  deviceNumber:
    type: string
    maxLength: 80
    description: |
      Unique meter number / device number assigned by the MSB.
      **German:** Eindeutige Gerätenummer / Zählernummer des MSB.
    x-i18n:
      de:
        description: Eindeutige Gerätenummer / Zählernummer, vergeben durch den MSB.
    examples:
      ModernMeter:
        summary: "ModernMeter"
        value: "1ESY1234567890"
      LegacyFerrarisType:
        summary: "LegacyFerrarisType"
        value: "EHZ0012345678"
      SmartMeter:
        summary: "SmartMeter"
        value: "SML9876543210"
      EDL21Meter:
        summary: "EDL21Meter"
        value: "1EMH0001234567"
    x-examples-i18n:
      de:
        ModernMeter: "Moderner Zähler"
        LegacyFerrarisType: "Ferraris-Zähler (alt)"
        SmartMeter: "Smart Meter"
        EDL21Meter: "EDL21-Zähler"

  meteringLocationId:
    type: string
    description: |
      Metering location ID (MeLo-ID). Present when the meter is installed
      at a metering location. Mutually exclusive with gridCouplingPointId.
      **German:** Messlokations-ID (MeLo-ID). Vorhanden wenn Zähler an Messlokation.
      Schließt sich mit Netzkopplungspunkt aus.
    x-i18n:
      de:
        description: MeLo-ID. Vorhanden wenn Zähler an Messlokation. Exklusiv mit NKP.
    examples:
      MeLo1:
        summary: "MeLo1"
        value: "DE0001234567890001ME000001S0A001"
      MeLo2:
        summary: "MeLo2"
        value: "DE0009876543210001ME000042S0B002"
    x-examples-i18n:
      de:
        MeLo1: "Messlokations-ID Beispiel 1"
        MeLo2: "Messlokations-ID Beispiel 2"

  gridCouplingPointId:
    type: integer
    description: |
      Grid coupling point ID (Netzkopplungspunkt-ID / NKP-ID). Present when the
      meter is installed at a grid coupling point. Mutually exclusive with
      meteringLocationId.
      **German:** Netzkopplungspunkt-ID (NKP-ID). Vorhanden wenn Zähler an NKP.
      Schließt sich mit Messlokation aus.
    x-i18n:
      de:
        description: NKP-ID. Vorhanden wenn Zähler an Netzkopplungspunkt. Exklusiv mit MeLo.
    examples:
      NKP1:
        summary: "NKP1"
        value: 8001
      NKP2:
        summary: "NKP2"
        value: 8002
    x-examples-i18n:
      de:
        NKP1: "Netzkopplungspunkt 1"
        NKP2: "Netzkopplungspunkt 2"

  msbActorId:
    type: integer
    description: |
      MSB operating this meter. **German:** Messstellenbetreiber (MSB) dieses Zählers.
    x-i18n:
      de:
        description: Messstellenbetreiber (MSB) des Zählers.
    examples:
      BasicMSB:
        summary: "BasicMSB"
        value: 42
      CompetitiveMSB:
        summary: "CompetitiveMSB"
        value: 55
    x-examples-i18n:
      de:
        BasicMSB: "Grundzuständiger MSB"
        CompetitiveMSB: "Wettbewerblicher MSB"

# ── XOR constraint: MeLo or NKP, never both, never neither ─────────────────

oneOf:
  - description: |
      **Meter at Metering Location (Messlokation):**
      meteringLocationId is present, gridCouplingPointId must be absent.
      **German:** Zähler an Messlokation: MeLo-ID vorhanden, NKP-ID verboten.
    required:
      - meteringLocationId
    properties:
      gridCouplingPointId:
        not: {}
        description: |
          Must not be present when meteringLocationId is provided.
          **German:** Darf nicht vorhanden sein, wenn Messlokation angegeben ist.
        x-i18n:
          de:
            description: Nicht erlaubt, wenn Messlokation angegeben.

  - description: |
      **Meter at Grid Coupling Point (Netzkopplungspunkt):**
      gridCouplingPointId is present, meteringLocationId must be absent.
      **German:** Zähler an Netzkopplungspunkt: NKP-ID vorhanden, MeLo-ID verboten.
    required:
      - gridCouplingPointId
    properties:
      meteringLocationId:
        not: {}
        description: |
          Must not be present when gridCouplingPointId is provided.
          **German:** Darf nicht vorhanden sein, wenn Netzkopplungspunkt angegeben ist.
        x-i18n:
          de:
            description: Nicht erlaubt, wenn Netzkopplungspunkt angegeben.
