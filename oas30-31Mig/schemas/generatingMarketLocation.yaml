title: GeneratingMarketLocation
description: |
  Market location conditional on energy direction.
  
  **UTILMD AHB Rule (SG8 SEQ / CCI, EnergyDirection):**
  - `CONSUMPTION` (verbrauchend): EIV actor must not be present;
    tranches not applicable; balancing group (Bilanzkreis) required
  - `GENERATION` (erzeugend): EIV actor (Einspeiseverantwortlicher)
    is required; tranches may be present for business cases ZW1/ZW2/ZX1;
    country of subsidy (Land der Förderung, SG10 CCI+Z23) required

  **German:** Marktlokation bedingt nach Energieflussrichtung.
  GENERATION erfordert EIV-Akteur und Land der Förderung.
  Tranchen erlaubt bei GVF ZW1/ZW2/ZX1.

x-i18n:
  de:
    title: Marktlokation nach Energieflussrichtung (bedingt)
    description: |
      Bedingtes Schema: Erzeugende MaLo erfordert EIV und Land der Förderung.
      Verbrauchende MaLo erfordert Bilanzkreis, kein EIV.

x-edifact-mapping:
  segments: "SG8 SEQ DE1229 (Z01/Z98), SG10 CCI+ZB3/CAV+Z91, SG10 CCI+Z23"
  conditions:
    GENERATION: "EIV required; SG10 CCI+Z23 (Land der Förderung) required"
    CONSUMPTION: "BKV/Bilanzkreis required; no EIV"

type: object
required:
  - maLoId
  - energyDirection

properties:
  maLoId:
    type: string
    pattern: '^[0-9]{11}$'
    description: |
      Market location ID (11 digits).
      **German:** Marktlokations-ID (11-stellig).
    x-i18n:
      de:
        description: Marktlokations-ID (11-stellig).
    examples:
      ConsumingMaLo:
        summary: "ConsumingMaLo"
        value: "51238696781"
      GeneratingMaLo:
        summary: "GeneratingMaLo"
        value: "62345678901"
    x-examples-i18n:
      de:
        ConsumingMaLo: "Verbrauchende Marktlokation"
        GeneratingMaLo: "Erzeugende Marktlokation"

  energyDirection:
    type: string
    enum: [CONSUMPTION, GENERATION]
    description: |
      Energy flow direction.
      **German:** Energieflussrichtung (Verbrauch / Erzeugung).
    x-i18n:
      de:
        description: Energieflussrichtung. CONSUMPTION=Verbrauch, GENERATION=Erzeugung.
    examples:
      Consumption:
        summary: "Consumption"
        value: "CONSUMPTION"
      Generation:
        summary: "Generation"
        value: "GENERATION"
    x-examples-i18n:
      de:
        Consumption: "Verbrauch (Bezug)"
        Generation: "Erzeugung (Einspeisung)"

  eivActorId:
    type: object
    description: |
      Feed-in manager (EIV – Einspeiseverantwortlicher).
      Required for generating locations, forbidden for consuming locations.
      **German:** Einspeiseverantwortlicher (EIV). Pflicht bei Erzeugung, verboten bei Verbrauch.
    x-i18n:
      de:
        description: EIV-Marktpartner. Pflicht bei erzeugender MaLo, verboten bei verbrauchender MaLo.
    properties:
      id:
        type: string
        examples:
          EIV1:
            summary: "EIV1"
            value: "9905000099901"
          EIV2:
            summary: "EIV2"
            value: "9905000099902"
        x-examples-i18n:
          de:
            EIV1: "Einspeiseverantwortlicher 1"
            EIV2: "Einspeiseverantwortlicher 2"
      codingScheme:
        type: string
        enum: ["9", "293"]

  balancingGroupCode:
    type: string
    description: |
      EIC code of the balancing group (Bilanzkreis).
      Required for consuming locations. Optional for generating locations.
      **German:** EIC-Code des Bilanzkreises. Pflicht bei verbrauchenden Marktlokationen.
    x-i18n:
      de:
        description: EIC-Code des Bilanzkreises. Pflicht bei Verbrauch.
    examples:
      SupplierA:
        summary: "SupplierA"
        value: "11XBKV-MUSTER-K"
      SupplierB:
        summary: "SupplierB"
        value: "11XBKV-ENERGY-L"
      DirectMkt:
        summary: "DirectMkt"
        value: "11XBKV-DIREKT-M"
    x-examples-i18n:
      de:
        SupplierA: "Bilanzkreis Lieferant A"
        SupplierB: "Bilanzkreis Lieferant B"
        DirectMkt: "Bilanzkreis Direktvermarktung"

  subsidyCountryCode:
    type: string
    maxLength: 2
    description: |
      Country of subsidy (Land der Förderung, ISO alpha-2).
      Required for generating locations (SG10 CCI+Z23).
      **German:** Land der Förderung (ISO alpha-2). Pflicht bei erzeugenden Marktlokationen.
      EDIFACT SG10 CCI+Z23.
    x-i18n:
      de:
        description: Land der Förderung (ISO alpha-2). Pflicht bei Erzeugung. EDIFACT SG10 CCI+Z23.
    examples:
      Germany:
        summary: "Germany"
        value: "DE"
      Austria:
        summary: "Austria"
        value: "AT"
    x-examples-i18n:
      de:
        Germany: "Deutschland"
        Austria: "Österreich"

  tranches:
    type: array
    description: |
      Tranches for partial quantity allocation (GVF ZW1/ZW2/ZX1).
      Only applicable for generating locations. Forbidden for consuming locations.
      **German:** Tranchen für Teilmengenzuordnungen (GVF ZW1/ZW2/ZX1).
      Nur bei erzeugenden Marktlokationen erlaubt.
    x-i18n:
      de:
        description: Tranchen (GVF ZW1/ZW2/ZX1). Nur bei erzeugenden Marktlokationen.
    items:
      type: object
      required: [trancheId, percentageShare]
      properties:
        trancheId:
          type: string
          description: Tranche ID. **German:** Tranchen-ID.
          x-i18n:
            de:
              description: Tranchen-ID.
        percentageShare:
          type: integer
          minimum: 1
          maximum: 100
          description: |
            Percentage share (positive integer, no decimals – AHB [914][937]).
            **German:** Prozentualer Anteil (positive ganze Zahl – AHB [914][937]).
          x-i18n:
            de:
              description: Prozentualer Anteil. Positive ganze Zahl (AHB [914][937]).

# ── Conditional: GENERATION vs CONSUMPTION ─────────────────────────────────

if:
  properties:
    energyDirection:
      const: GENERATION
  required: [energyDirection]

then:
  description: |
    **GENERATION (Erzeugende Marktlokation):**
    - eivActorId is required
    - subsidyCountryCode is required (SG10 CCI+Z23 Land der Förderung)
    - tranches may be present
    - balancingGroupCode is optional (may be set for Direktvermarktung)
  required:
    - eivActorId
    - subsidyCountryCode

else:
  description: |
    **CONSUMPTION (Verbrauchende Marktlokation):**
    - balancingGroupCode is required
    - eivActorId must not be present
    - tranches must not be present
    - subsidyCountryCode must not be present
  required:
    - balancingGroupCode
  properties:
    eivActorId:
      not: {}
      description: |
        Must not be present for consuming locations.
        **German:** Nicht erlaubt bei verbrauchenden Marktlokationen.
      x-i18n:
        de:
          description: Nicht erlaubt bei verbrauchenden Marktlokationen.
    tranches:
      maxItems: 0
      description: |
        Not applicable for consuming locations.
        **German:** Nicht anwendbar bei verbrauchenden Marktlokationen.
      x-i18n:
        de:
          description: Nicht anwendbar bei verbrauchenden Marktlokationen.
    subsidyCountryCode:
      not: {}
      description: |
        Not applicable for consuming locations.
        **German:** Nicht anwendbar bei verbrauchenden Marktlokationen.
      x-i18n:
        de:
          description: Nicht anwendbar bei verbrauchenden Marktlokationen.
