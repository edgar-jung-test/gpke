    properties:
      externalId:
        type: string
        description: |
          Identifier of the control device (DIN 43863-5 format).
          **German:** Gerätenummer der Steuereinrichtung (Format DIN 43863-5).
        x-i18n:
          de:
            description: Gerätenummer der Steuereinrichtung (DIN 43863-5).
        examples:
          RSE1:
            summary: "RSE1"
            value: "SE-00042-001"
          TSU1:
            summary: "TSU1"
            value: "SE-00042-002"
          SMGW1:
            summary: "SMGW1"
            value: "SE-10001-001"
        x-examples-i18n:
