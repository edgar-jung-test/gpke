title: ControllableResourceWithControl
description: |
  Controllable resource (Steuerbare Ressource / SR) with its required control unit.
  A controllable resource must have **exactly one** of:
  - `controlDevice` (Steuereinrichtung) – e.g. ripple control receiver (RSE),
    tariff time switch (TSU), or smart meter gateway
  - `controlBox` (Steuerbox) – alternative control unit

  Having both or neither is invalid.

  **UTILMD AHB Rule (SG5 LOC+Z19 / SG8 SEQ):**
  Steuerbare Ressource requires either Steuereinrichtung or Steuerbox – mutually exclusive.
  Corresponds to the ERM constraint: SR braucht entweder Steuereinrichtung oder Steuerbox.

  **German:** Steuerbare Ressource mit genau einer Steuereinheit.
  Entweder Steuereinrichtung ODER Steuerbox – gegenseitig ausschließend.
  EDIFACT SG5 LOC+Z19, Rollenmodell-Constraint.

x-i18n:
  de:
    title: Steuerbare Ressource mit Steuereinheit (bedingt)
    description: |
      Bedingtes Schema: Steuerbare Ressource benötigt genau eine Steuereinheit.
      Steuereinrichtung XOR Steuerbox – gegenseitig ausschließend.

