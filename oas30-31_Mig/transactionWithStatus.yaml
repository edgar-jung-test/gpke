          - RSU: Ripple control receiver (Rundsteuerempfänger)
          - TSU: Tariff time switch (Tarifschaltuhr)
          - SMGW: Smart meter gateway
          **German:** Typ der Steuereinrichtung. RSU=Rundsteuerempfänger, TSU=Tarifschaltuhr.
        x-i18n:
