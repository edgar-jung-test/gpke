            Box1: "Steuerbox 1"
            Box2: "Steuerbox 2"

# ── Conditional: exactly one of controlDevice OR controlBox ────────────────
#
# Pattern: use oneOf on presence to enforce XOR
#
oneOf:
  - description: |
      **With controlDevice (Steuereinrichtung):**
      controlDevice is present and controlBox is absent.
      **German:** Mit Steuereinrichtung: controlDevice vorhanden, controlBox nicht erlaubt.
    required:
      - controlDevice
    properties:
      controlBox:
        not: {}
        description: |
          Must not be present when controlDevice is provided.
          **German:** Darf nicht vorhanden sein, wenn Steuereinrichtung angegeben ist.
        x-i18n:
          de:
            description: Nicht erlaubt, wenn Steuereinrichtung vorhanden.

  - description: |
      **With controlBox (Steuerbox):**
      controlBox is present and controlDevice is absent.
      **German:** Mit Steuerbox: controlBox vorhanden, controlDevice nicht erlaubt.
    required:
      - controlBox
    properties:
      controlDevice:
        not: {}
        description: |
          Must not be present when controlBox is provided.
          **German:** Darf nicht vorhanden sein, wenn Steuerbox angegeben ist.
        x-i18n:
          de:
            description: Nicht erlaubt, wenn Steuerbox vorhanden.
